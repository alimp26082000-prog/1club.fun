<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1CLUB PRO - Official</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root { --primary:#fb5153; --bg:#f5f6fa; --green:#2ecc71; --red:#e74c3c; --violet:#9b59b6; --gold:#fbc531; --orange:#ffa502; }

body{font-family:'Poppins',sans-serif;background:var(--bg);margin:0;padding-bottom:30px;}
.header{background:var(--primary);padding:15px;color:#fff;display:flex;justify-content:space-between;font-weight:800}
.wallet-box{background:#fff;margin:15px;border-radius:20px;padding:20px;text-align:center}
.bal-amt{font-size:30px;font-weight:800;margin:10px 0;cursor:pointer}
.game-area{background:#fff;margin:15px;border-radius:20px;padding:15px}
.timer-box{display:flex;justify-content:space-between;background:#fff5f5;padding:10px;border-radius:12px;margin-bottom:20px}
.grid-btn{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}
.btn{border:none;padding:12px;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}
.num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
.n-btn{border:2px solid #ddd;background:#fff;padding:10px;border-radius:50%;font-weight:bold;width:45px;height:45px;display:flex;align-items:center;justify-content:center;margin:auto}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
table{width:100%;font-size:12px;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid #eee;padding:8px;text-align:center}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:5000;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:15px;width:90%;max-height:80vh;overflow-y:auto}

/* Stylish Popup Design */
.result-popup {
    text-align: center;
    padding: 20px;
    border-radius: 20px;
    color: white;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.win-bg { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.loss-bg { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.res-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
.res-amount { font-size: 32px; font-weight: 800; margin: 10px 0; }
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>

<body>

<div class="header">
<span>1CLUB PRO</span>
<span id="uID">ID: --</span>
</div>

<div class="wallet-box">
<small>Wallet Balance</small>
<div class="bal-amt" onclick="checkAdmin()">₹<span id="uBal">0.00</span></div>
</div>

<div class="game-area">
<div class="timer-box">
<div><small style="color:red;">Period</small><br><b id="period">---</b></div>
<div style="text-align:right;"><small>Time</small><br><b id="timer">00:60</b></div>
</div>
<div class="grid-btn">
<button class="btn" style="background:var(--green)" onclick="betPopup('Green')">Green</button>
<button class="btn" style="background:var(--violet)" onclick="betPopup('Violet')">Violet</button>
<button class="btn" style="background:var(--red)" onclick="betPopup('Red')">Red</button>
</div>
<div id="nums" class="num-grid"></div>
<div class="bs-grid">
<button class="btn" style="background:#ffa502" onclick="betPopup('Big')">Big</button>
<button class="btn" style="background:#2f3542" onclick="betPopup('Small')">Small</button>
</div>
</div>

<div class="game-area">
<h4>History (Last 20 Results)</h4>
<table id="resTable"></table>
</div>

<div id="resModal" class="modal">
    <div id="resBox" class="modal-content result-popup">
        <div id="resStatus" class="res-title">Winning</div>
        <div id="resMsg">Congratulations!</div>
        <div id="resAmt" class="res-amount">+₹0.00</div>
        <button class="btn" style="background:#fff; color:#333; width:100%" onclick="closeM('resModal')">Close</button>
    </div>
</div>

<div id="adminM" class="modal">
<div class="modal-content">
<h3>ADMIN CONTROL</h3>
<div id="adminReqs"></div>
<button onclick="closeM('adminM')">Close</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
authDomain:"my-colour-game-670af.firebaseapp.com",
databaseURL:"https://my-colour-game-670af-default-rtdb.firebaseio.com",
projectId:"my-colour-game-670af"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let uid=localStorage.getItem('UID')||"U"+Math.floor(1000+Math.random()*9000);
localStorage.setItem('UID',uid);

db.ref('users/'+uid).on('value',s=>{
let bal=(s.val()&&s.val().balance)||0;
document.getElementById('uBal').innerText=bal.toFixed(2);
document.getElementById('uID').innerText="ID: "+uid;
});

// FIXED: History Last 20 with Correct Order
db.ref('global_res').limitToLast(20).on('value', snap => {
    let h = `<tr><th>Period</th><th>Number</th><th>Colour</th><th>Size</th></tr>`;
    let rows = [];
    snap.forEach(c => { rows.push({ p: c.key, ...c.val() }); });
    rows.reverse(); // Latest at Top
    rows.forEach(d => {
        h += `<tr><td>${d.p}</td><td>${d.num}</td><td style="color:var(--${d.win.toLowerCase()})">${d.win}</td><td>${d.size}</td></tr>`;
    });
    document.getElementById('resTable').innerHTML = h;
});

// LOGIC: Low Bet Amount Wins
function getWinningResult(bets) {
    let bigAmt = bets.big || 0;
    let smallAmt = bets.small || 0;
    if (bigAmt < smallAmt) {
        return { size: "Big", num: 6 }; // Example Big number
    } else {
        return { size: "Small", num: 2 }; // Example Small number
    }
}

// STYLISH POPUP TRIGGER
function showResult(isWin, amount) {
    const box = document.getElementById('resBox');
    const status = document.getElementById('resStatus');
    const amtText = document.getElementById('resAmt');
    
    if(isWin) {
        box.className = "modal-content result-popup win-bg";
        status.innerText = "WINNING";
        amtText.innerText = "+₹" + amount;
    } else {
        box.className = "modal-content result-popup loss-bg";
        status.innerText = "LOSS";
        amtText.innerText = "-₹" + amount;
    }
    openM('resModal');
}

let nH="";
for(let i=0;i<=9;i++){
    let c=(i%2==0)?'red':'green';
    if(i==0||i==5)c='violet';
    nH+=`<button class="n-btn" style="color:${c};border-color:${c}" onclick="betPopup('${i}')">${i}</button>`;
}
document.getElementById('nums').innerHTML=nH;

function checkAdmin(){ if(prompt("Admin Password")=="77759636477"){ openM('adminM'); loadAdmin(); } }
function loadAdmin(){
    db.ref('requests').on('value',snap=>{
        let h="<table>";
        snap.forEach(r=>{
            let d=r.val();
            h+=`<tr><td>${d.uid}</td><td>${d.amt}</td><td>${d.type}</td>
                <td><button onclick="approveReq('${r.key}','${d.uid}',${d.amt},'${d.type}')">Approve</button></td></tr>`;
        });
        h+="</table>";
        document.getElementById('adminReqs').innerHTML=h;
    });
}
function approveReq(k,u,a,t){ if(t=="Deposit"){ db.ref('users/'+u+'/balance').transaction(c=>(c||0)+parseFloat(a)); } db.ref('requests/'+k).remove(); }
function betPopup(t){ alert("Bet: "+t); }
function openM(id){ document.getElementById(id).style.display="flex"; }
function closeM(id){ document.getElementById(id).style.display="none"; }
</script>
</body>
</html>
