<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2b3270; --bg: #0c0f26; --accent: #ffc107; --green: #00c853; --red: #ff1744; --violet: #aa00ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #fff; user-select: none; }
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--primary); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--accent); }
        .top-nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .wallet-card { background: linear-gradient(135deg, #3f478a, #2b3270); margin: 15px; padding: 20px; border-radius: 20px; }
        .bal-amt { font-size: 36px; font-weight: bold; color: var(--accent); }
        .game-card { background: #1e254d; margin: 10px; border-radius: 20px; padding: 20px; border: 1px solid #3f478a; }
        .bet-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .bet-btn { border: none; padding: 15px; border-radius: 12px; font-weight: 900; color: #fff; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: var(--primary); padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--accent); text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #0c0f26; color: #fff; text-align: center; }
        #resPop { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; background: #fff; color: #000; padding: 30px; border-radius: 20px; text-align: center; width: 260px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h1 style="color:var(--accent);">1CLUB PRO</h1>
        <p>Login with Mobile Number</p>
        <input type="number" id="lPhone" placeholder="Enter Mobile Number">
        <button onclick="instantLogin()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">START GAME</button>
    </div>
</div>

<div id="gameUI" style="display:none;">
    <div class="top-nav">
        <div style="font-weight:900; font-size:22px;">1CLUB <span style="color:var(--accent);">PRO</span></div>
        <div id="uID" style="font-size:12px; background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:50px;">ID: ...</div>
    </div>
    <div class="wallet-card">
        <div style="font-size:14px; opacity:0.8;">Balance</div>
        <div class="bal-amt">₹<span id="uBal">0.00</span></div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button onclick="openM('depM')" style="flex:1; padding:14px; background:var(--green); border:none; border-radius:12px; color:white; font-weight:bold;">DEPOSIT</button>
            <button onclick="openM('witM')" style="flex:1; padding:14px; background:var(--red); border:none; border-radius:12px; color:white; font-weight:bold;">WITHDRAW</button>
        </div>
        <div onclick="openAdminCheck()" style="text-align:center; font-size:10px; margin-top:15px; opacity:0.2;">ADMIN CONTROL</div>
    </div>
    <div class="game-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <div><small>Period</small><br><b id="period">...</b></div>
            <div style="text-align:right;"><small>Time Left</small><br><b id="timer" style="color:var(--accent); font-size:24px;">00:00</b></div>
        </div>
        <div class="bet-grid">
            <button class="bet-btn" style="background:var(--green)" onclick="placeBet('Green')">GREEN</button>
            <button class="bet-btn" style="background:var(--violet)" onclick="placeBet('Violet')">VIOLET</button>
            <button class="bet-btn" style="background:var(--red)" onclick="placeBet('Red')">RED</button>
        </div>
    </div>
    <div id="hGrid" style="padding:15px; text-align:center;"></div>
</div>

<div id="resPop">
    <h2 id="resT">-</h2>
    <p id="resA" style="font-size:28px; font-weight:bold; margin:15px 0;">-</p>
    <button onclick="closeResult()" style="background:var(--primary); color:#fff; border:none; padding:12px 30px; border-radius:10px; width:100%;">OK</button>
</div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>Deposit</h3>
    <input type="number" id="da" placeholder="Amount" oninput="showQR()">
    <div id="qrBox" style="display:none;"><img id="qrImg" src="" style="width:150px; margin:10px;"></div>
    <input type="text" id="du" placeholder="UTR No.">
    <button onclick="sendD()" style="width:100%; padding:15px; background:var(--green); border:none; border-radius:12px; color:white; font-weight:bold;">SUBMIT</button>
    <button onclick="closeM('depM')" style="background:none; border:none; color:red; margin-top:10px;">Cancel</button>
</div></div>

<div id="witM" class="modal"><div class="modal-content">
    <h3>Withdraw</h3>
    <input type="number" id="wa" placeholder="Amount (Min ₹200)">
    <input type="text" id="wu" placeholder="UPI ID">
    <button onclick="sendW()" style="width:100%; padding:15px; background:var(--red); border:none; border-radius:12px; color:white; font-weight:bold;">SUBMIT</button>
    <button onclick="closeM('witM')" style="background:none; border:none; color:red; margin-top:10px;">Cancel</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
      authDomain: "my-colour-game-670af.firebaseapp.com",
      databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com",
      projectId: "my-colour-game-670af",
      storageBucket: "my-colour-game-670af.firebasestorage.app",
      messagingSenderId: "1098639199054",
      appId: "1:1098639199054:web:b34a5aa3120ec0dbc5ac1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('ouid');
    let myBal = 0;
    let periodBets = { Green: 0, Red: 0, Violet: 0 };

    if(uid) { showGame(); }

    function instantLogin() {
        let phone = document.getElementById('lPhone').value;
        if(phone.length >= 10) {
            uid = "ID" + phone.slice(-4);
            localStorage.setItem('ouid', uid);
            // Background check/create
            db.ref('users/' + uid).get().then(s => {
                if(!s.exists()) db.ref('users/' + uid).set({ balance: 0, phone: phone });
            });
            showGame();
        } else { alert("Enter 10-digit number"); }
    }

    function showGame() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('gameUI').style.display = 'block';
        initGame();
    }

    function initGame() {
        db.ref('users/' + uid).on('value', s => {
            myBal = s.val() ? s.val().balance : 0;
            document.getElementById('uBal').innerText = myBal.toFixed(2);
            document.getElementById('uID').innerText = "ID: " + uid;
        });
        setInterval(() => {
            let sec = 60 - new Date().getSeconds();
            document.getElementById('timer').innerText = "00:" + (sec < 10 ? "0"+sec : sec);
            document.getElementById('period').innerText = Math.floor(new Date().getTime()/10000);
            if(sec === 1) processResult();
        }, 1000);
        loadHistory();
    }

    function placeBet(color) {
        let amt = prompt("Bet on " + color + " (Min ₹10):", "10");
        if(amt && myBal >= amt && amt >= 10) {
            let bAmt = parseFloat(amt);
            db.ref('users/'+uid).update({ balance: myBal - bAmt });
            periodBets[color] += bAmt;
            db.ref('active_bets').push({ color: color, amount: bAmt });
            alert("Bet Placed: ₹" + amt);
        } else { alert("Check Balance"); }
    }

    function processResult() {
        db.ref('active_bets').once('value', (snap) => {
            let pools = { Green: 0, Red: 0, Violet: 0 };
            snap.forEach(b => { pools[b.val().color] += b.val().amount; });

            db.ref('admin/manual_win').once('value', s => {
                let winColor = s.val() || Object.keys(pools).reduce((a, b) => pools[a] < pools[b] ? a : b);
                db.ref('admin/manual_win').set(null);
                db.ref('history').push({ Green: '#00c853', Red: '#ff1744', Violet: '#aa00ff' }[winColor]);
                
                let winAmt = periodBets[winColor] * 1.9;
                if(winAmt > 0) {
                    db.ref('users/'+uid).update({ balance: myBal + winAmt });
                    showRes("WIN! 🏆", "+₹" + winAmt.toFixed(2), "#00c853");
                } else if(periodBets.Green + periodBets.Red + periodBets.Violet > 0) {
                    showRes("LOST! ❌", "Try Again", "#ff1744");
                }
                periodBets = { Green: 0, Red: 0, Violet: 0 };
                db.ref('active_bets').remove();
            });
        });
    }

    function showRes(t, a, c) { document.getElementById('resT').innerText = t; document.getElementById('resT').style.color = c; document.getElementById('resA').innerText = a; document.getElementById('resPop').style.display = 'block'; }
    function closeResult() { document.getElementById('resPop').style.display = 'none'; }
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function showQR() { let a = document.getElementById('da').value; if(a>=10){ document.getElementById('qrImg').src=`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=poonamlondhe52-1@okhdfcbank%26pn=1CLUB_PRO%26am=${a}`; document.getElementById('qrBox').style.display='block'; }}
    function sendD() { let a=document.getElementById('da').value, u=document.getElementById('du').value; if(a>=10 && u){ db.ref('pending_deposits').push({uid, amt:a, utr:u}); alert("Submitted!"); closeM('depM'); }}
    function sendW() { let a=document.getElementById('wa').value, u=document.getElementById('wu').value; if(a>=200 && myBal>=a){ db.ref('users/'+uid).update({balance: myBal - parseFloat(a)}); db.ref('pending_withdrawals').push({uid, amt:a, upi:u}); alert("Requested!"); closeM('witM'); }}
    function loadHistory() { db.ref('history').limitToLast(15).on('value', s => { let g=document.getElementById('hGrid'); g.innerHTML=""; s.forEach(d => { g.innerHTML+=`<div style="width:12px; height:12px; border-radius:50%; background:${d.val()}; display:inline-block; margin:3px;"></div>`; }); }); }
</script>
</body>
</html>
