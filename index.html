<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fb5153; --bg: #f5f6fa; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; --gold: #fbc531; --orange: #ffa502; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; user-select: none; }
        .header { background: var(--primary); padding: 15px; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .wallet-box { background: #fff; margin: 15px; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .bal-amt { font-size: 30px; font-weight: 800; margin: 10px 0; cursor: pointer; }
        .game-area { background: #fff; margin: 15px; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .timer-box { display: flex; justify-content: space-between; background: #fff5f5; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .grid-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .n-btn { border: 2px solid #ddd; background: #fff; padding: 10px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        /* Invite Section */
        .invite-card { background: var(--gold); padding: 15px; border-radius: 15px; margin: 15px; text-align: center; font-weight: 800; cursor: pointer; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Modal Settings */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 15px; width: 95%; max-height: 85vh; overflow-y: auto; text-align: center; }

        /* Betting Sheet */
        .bet-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-radius: 25px 25px 0 0; z-index: 3000; display: none; flex-direction: column; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .bet-head { background: var(--orange); padding: 15px; color: #fff; border-radius: 25px 25px 0 0; font-weight: bold; }
        .bet-body { padding: 20px; }
        .bet-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .multi-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .m-btn { border: none; background: #eee; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .m-btn.active { background: var(--orange); color: #fff; }
        
        /* Manual Type Input [New Request] */
        .manual-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; text-align: center; font-size: 16px; outline: none; }

        /* Admin Styles */
        .approve-btn { background: var(--green); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .reject-btn { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: center; }
    </style>
</head>
<body>

<div class="header"><span>1CLUB PRO</span><span id="uID">ID: --</span></div>

<div class="wallet-box">
    <small>Wallet Balance</small>
    <div class="bal-amt" onclick="checkAdmin()">₹<span id="uBal">0.00</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="openM('depM')" style="flex:1; background:var(--green); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Deposit</button>
        <button onclick="openM('witM')" style="flex:1; background:var(--primary); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Withdraw</button>
    </div>
</div>

<div class="game-area">
    <div class="timer-box">
        <div><small style="color:red;">Period</small><br><b id="period">---</b></div>
        <div style="text-align:right;"><small>Time Remaining</small><br><b id="timer" style="font-size:22px; color:var(--primary);">00:00</b></div>
    </div>
    <div class="grid-btn">
        <button class="btn" style="background:var(--green)" onclick="betPopup('Green')">Green</button>
        <button class="btn" style="background:var(--violet)" onclick="betPopup('Violet')">Violet</button>
        <button class="btn" style="background:var(--red)" onclick="betPopup('Red')">Red</button>
    </div>
    <div class="num-grid" id="nums"></div>
    <div class="bs-grid">
        <button class="btn" style="background:#ffa502" onclick="betPopup('Big')">Big</button>
        <button class="btn" style="background:#2f3542" onclick="betPopup('Small')">Small</button>
    </div>
</div>

<div class="invite-card" onclick="copyInvite()">🎁 INVITE FRIENDS (GET 10% BONUS)</div>

<div class="game-area">
    <table id="resTable"><tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr></table>
</div>

<div id="betSheet" class="bet-sheet">
    <div class="bet-head" id="betTitle">Select Option</div>
    <div class="bet-body">
        <div class="bet-row">
            <span>Amount</span>
            <div class="multi-btns">
                <button class="m-btn active" onclick="setBase(10, this)">10</button>
                <button class="m-btn" onclick="setBase(100, this)">100</button>
                <button class="m-btn" onclick="setBase(1000, this)">1000</button>
            </div>
        </div>
        <input type="number" id="manualAmt" class="manual-input" placeholder="Type Amount Manually" oninput="updateManual()">
        <div class="bet-row" style="margin-top:15px;">
            <span>Multiple</span>
            <div class="multi-btns">
                <button class="m-btn" onclick="setX(1, this)">X1</button>
                <button class="m-btn" onclick="setX(5, this)">X5</button>
                <button class="m-btn" onclick="setX(10, this)">X10</button>
            </div>
        </div>
        <div style="display:flex; margin-top:20px;">
            <button onclick="closeBet()" style="flex:1; background:#eee; border:none; padding:15px; border-radius:8px;">Cancel</button>
            <button onclick="confirmBet()" style="flex:2; background:var(--orange); color:white; border:none; padding:15px; font-weight:bold; border-radius:8px; margin-left:10px;">Total ₹<span id="totalBet">10.00</span></button>
        </div>
    </div>
</div>

<div id="adminM" class="modal"><div class="modal-content">
    <h3>ADMIN DASHBOARD</h3>
    <h4>Deposit Requests</h4>
    <div id="depList"></div>
    <button onclick="closeM('adminM')" style="margin-top:20px; width:100%; padding:10px; background:#444; color:#fff; border:none; border-radius:8px;">Exit Admin</button>
</div></div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>Deposit</h3>
    <input type="number" id="dAmt" placeholder="Amount" style="width:90%; padding:10px; margin-bottom:10px;">
    <button onclick="sendDep()" style="width:100%; background:var(--green); border:none; padding:12px; color:#fff; border-radius:8px;">Submit</button>
    <p onclick="closeM('depM')" style="cursor:pointer; color:red;">Close</p>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU", authDomain: "my-colour-game-670af.firebaseapp.com", databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com", projectId: "my-colour-game-670af" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('1CLUB_UID_FINAL') || "U"+Math.floor(1000+Math.random()*9000);
    localStorage.setItem('1CLUB_UID_FINAL', uid);
    let bal = 0, baseAmt = 10, multiplier = 1, selType = '';

    // Data Sync
    db.ref('users/'+uid).on('value', s => { bal = (s.val() && s.val().balance) || 0; document.getElementById('uBal').innerText = bal.toFixed(2); document.getElementById('uID').innerText = "ID: "+uid; });

    // Betting Logic
    function betPopup(t) { selType = t; document.getElementById('betTitle').innerText = "Select " + t; document.getElementById('betSheet').style.display = 'block'; updateTotal(); }
    function setBase(v, btn) { baseAmt = v; document.getElementById('manualAmt').value = ''; resetBtnStyles('.multi-btns .m-btn'); btn.classList.add('active'); updateTotal(); }
    function setX(x, btn) { multiplier = x; updateTotal(); }
    function updateManual() { let val = document.getElementById('manualAmt').value; if(val > 0) baseAmt = parseFloat(val); updateTotal(); }
    function updateTotal() { document.getElementById('totalBet').innerText = (baseAmt * multiplier).toFixed(2); }
    function closeBet() { document.getElementById('betSheet').style.display = 'none'; }
    function resetBtnStyles(selector) { document.querySelectorAll(selector).forEach(b => b.classList.remove('active')); }

    function confirmBet() {
        let total = baseAmt * multiplier;
        if(bal >= total) {
            db.ref('users/'+uid).update({balance: bal - total});
            db.ref('bets/'+document.getElementById('period').innerText+'/'+uid).push({type: selType, amt: total});
            closeBet();
        } else alert("Low Balance!");
    }

    // Admin Control
    function checkAdmin() { if(prompt("Pass:")=="77759636477") { openM('adminM'); loadAdmin(); } }
    function loadAdmin() {
        db.ref('requests').on('value', s => {
            let h = "<table><tr><th>UID</th><th>Amt</th><th>Action</th></tr>";
            s.forEach(r => { let d = r.val(); h += `<tr><td>${d.uid}</td><td>${d.amt}</td><td><button class="approve-btn" onclick="appr('${r.key}','${d.uid}',${d.amt})">✔</button><button class="reject-btn" onclick="remReq('${r.key}')">✖</button></td></tr>`; });
            document.getElementById('depList').innerHTML = h + "</table>";
        });
    }
    function appr(k,u,a) { db.ref('users/'+u+'/balance').transaction(c=>(c||0)+a); remReq(k); }
    function remReq(k) { db.ref('requests/'+k).remove(); }

    // Timer & UI
    setInterval(() => { let now = Date.now(), s = 60 - Math.floor((now / 1000) % 60); document.getElementById('timer').innerText = "00:" + (s < 10 ? "0"+s : s); document.getElementById('period').innerText = Math.floor(now / 60000); }, 1000);
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function copyInvite() { navigator.clipboard.writeText(window.location.href + "?ref=" + uid); alert("Link Copied!"); }
    function sendDep() { db.ref('requests').push({uid, amt: parseInt(document.getElementById('dAmt').value), type:'Dep'}); alert("Submitted!"); closeM('depM'); }
</script>
</body>
</html>
