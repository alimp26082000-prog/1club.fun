<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1CLUB PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>

:root{
--primary:#2b3270;
--bg:#0c0f26;
--accent:#ffc107;
--green:#00c853;
--red:#ff1744;
--violet:#aa00ff;
}

body{
font-family:Segoe UI;
background:var(--bg);
margin:0;
color:white;
}

#loginScreen{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
}

.login-card{
background:var(--primary);
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:400px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
text-align:center;
}

.top-nav{
background:var(--primary);
padding:15px;
display:flex;
justify-content:space-between;
}

.wallet-card{
background:#1e254d;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
}

.bal-amt{
font-size:36px;
color:var(--accent);
}

.bet-btn{
border:none;
padding:15px;
border-radius:12px;
font-weight:bold;
color:white;
width:31%;
}

.game-card{
background:#1e254d;
margin:10px;
padding:20px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #333;
padding:8px;
text-align:center;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.modal-content{
background:var(--primary);
padding:20px;
border-radius:20px;
width:90%;
max-width:350px;
text-align:center;
}

</style>

</head>

<body>

<div id="loginScreen">

<div class="login-card">

<h2 style="color:var(--accent)">1CLUB PRO</h2>

<input type="tel" id="lPhone" placeholder="Enter Mobile Number" maxlength="10">

<button onclick="instantLogin()" style="width:100%;padding:15px;background:var(--accent);border:none;border-radius:10px;font-weight:bold;">
START GAME
</button>

</div>
</div>

<div id="gameUI" style="display:none">

<div class="top-nav">

<div>1CLUB <span style="color:var(--accent)">PRO</span></div>

<div id="uID"></div>

</div>

<div class="wallet-card">

Balance

<div class="bal-amt">₹<span id="uBal">0</span></div>

</div>

<div class="game-card">

<div style="display:flex;justify-content:space-between">

<div>
<small>Period</small><br>
<b id="period"></b>
</div>

<div>
<small>Time</small><br>
<b id="timer"></b>
</div>

</div>

<div style="display:flex;justify-content:space-between;margin-top:15px">

<button class="bet-btn" style="background:var(--green)" onclick="placeBet('Green')">GREEN</button>

<button class="bet-btn" style="background:var(--violet)" onclick="placeBet('Violet')">VIOLET</button>

<button class="bet-btn" style="background:var(--red)" onclick="placeBet('Red')">RED</button>

</div>

</div>

<div style="padding:15px">

<h3>Last 20 Results</h3>

<table>

<thead>
<tr>
<th>Period</th>
<th>Result</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<div id="betModal" class="modal">

<div class="modal-content">

<h3 id="betTitle"></h3>

<input type="number" id="betAmount" placeholder="Enter Amount">

<button onclick="confirmBet()" style="background:var(--green);padding:12px;border:none;border-radius:10px;color:white;width:100%;">
CONFIRM BET
</button>

<button onclick="closeM('betModal')" style="margin-top:10px;background:none;border:none;color:red;">
Cancel
</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCrt3",
authDomain:"my-colour-game-670af.firebaseapp.com",
databaseURL:"https://my-colour-game-670af-default-rtdb.firebaseio.com",
projectId:"my-colour-game-670af"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

let uid=localStorage.getItem("ouid")

let myBal=0

let selectedColor=""

let periodBets={Green:0,Red:0,Violet:0}

let lastPeriod=null

if(uid){showGameUI()}

function instantLogin(){

let phone=document.getElementById("lPhone").value.trim()

if(phone.length!=10){

alert("Enter 10 digit mobile number")

return

}

uid="ID"+phone

localStorage.setItem("ouid",uid)

db.ref("users/"+uid).once("value").then(s=>{

if(!s.exists()){

db.ref("users/"+uid).set({

balance:0,
phone:phone

})

}

showGameUI()

})

}

function showGameUI(){

document.getElementById("loginScreen").style.display="none"

document.getElementById("gameUI").style.display="block"

initSystem()

}

function initSystem(){

db.ref("users/"+uid).on("value",s=>{

myBal=s.val()?s.val().balance:0

document.getElementById("uBal").innerText=myBal.toFixed(2)

document.getElementById("uID").innerText="ID:"+uid

})

setInterval(updateTimer,1000)

loadHistory()

}

function updateTimer(){

let sec=60-new Date().getSeconds()

document.getElementById("timer").innerText="00:"+String(sec).padStart(2,"0")

let currentPeriod=Math.floor(new Date().getTime()/60000)

document.getElementById("period").innerText=currentPeriod

if(lastPeriod!=currentPeriod){

lastPeriod=currentPeriod

calculateRound()

}

}

function placeBet(color){

selectedColor=color

document.getElementById("betTitle").innerText="Bet on "+color

document.getElementById("betAmount").value=""

openM("betModal")

}

function confirmBet(){

let amt=parseFloat(document.getElementById("betAmount").value)

if(!amt||amt<10){

alert("Minimum Bet ₹10")

return

}

if(myBal<amt){

alert("Insufficient Balance")

return

}

db.ref("users/"+uid).update({

balance:myBal-amt

})

periodBets[selectedColor]+=amt

db.ref("active_bets").push({

uid:uid,
color:selectedColor,
amount:amt

})

closeM("betModal")

alert("Bet Placed")

}

function calculateRound(){

let colors=["Green","Red","Violet"]

let winColor=colors[Math.floor(Math.random()*3)]

let winAmt=periodBets[winColor]*1.9

if(winAmt>0){

db.ref("users/"+uid).update({

balance:myBal+winAmt

})

alert("WIN ₹"+winAmt)

}else if(periodBets.Green+periodBets.Red+periodBets.Violet>0){

alert("LOST")

}

db.ref("history").push({

period:lastPeriod,
color:winColor

})

periodBets={Green:0,Red:0,Violet:0}

}

function loadHistory(){

db.ref("history").limitToLast(20).on("value",snap=>{

let html=""

snap.forEach(d=>{

let data=d.val()

html=`<tr>
<td>${data.period}</td>
<td style="color:${data.color}">${data.color}</td>
</tr>`+html

})

document.getElementById("historyTable").innerHTML=html

})

}

function openM(id){

document.getElementById(id).style.display="flex"

}

function closeM(id){

document.getElementById(id).style.display="none"

}

</script>

</body>
</html>
