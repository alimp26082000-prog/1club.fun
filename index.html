<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a1f3c; --bg: #070a1a; --accent: #ffc107; --green: #00e676; --red: #ff5252; --violet: #d500f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: #fff; overflow-x: hidden; }
        .top-nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #252b52; }
        .wallet-card { background: linear-gradient(145deg, #2b3270, #1a1f3c); margin: 15px; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #3f478a; }
        .bal-amt { font-size: 36px; font-weight: 800; color: var(--accent); text-shadow: 0 0 10px rgba(255,193,7,0.3); }
        .game-card { background: #151a33; margin: 15px; border-radius: 25px; padding: 20px; border: 1px solid #252b52; }
        
        /* Stylish Bet Buttons */
        .color-btns { display: flex; justify-content: space-between; gap: 10px; margin: 20px 0; }
        .btn-main { border: none; padding: 18px; border-radius: 15px; font-weight: 900; color: #fff; cursor: pointer; flex: 1; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-main:active { transform: translateY(3px); }

        /* New Bet Sheet (Attractive) */
        .bet-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1a1f3c; border-radius: 30px 30px 0 0; z-index: 10000; padding: 25px; box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-top: 2px solid var(--accent); }
        .bet-sheet.active { bottom: 0; }
        .amt-chip { background: #0c0f26; border: 1px solid #3f478a; padding: 10px 15px; border-radius: 10px; color: #fff; cursor: pointer; font-weight: bold; flex: 1; text-align: center; }
        .amt-chip.selected { border-color: var(--accent); background: rgba(255,193,7,0.1); color: var(--accent); }
        .place-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; margin-top: 20px; font-size: 18px; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #1a1f3c; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #3f478a; background: #0c0f26; color: #fff; box-sizing: border-box; }
        .trend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin: 3px; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #252b52; text-align: center; }
    </style>
</head>
<body>

<div id="mainUI">
    <div class="top-nav">
        <div style="font-weight:900; font-size:22px; color:var(--accent);">1CLUB PRO</div>
        <div id="uID" style="font-size:11px; opacity:0.6;">ID: Loading...</div>
    </div>

    <div class="wallet-card">
        <small style="opacity:0.6; text-transform:uppercase;">Current Balance</small>
        <div class="bal-amt" onclick="adminGo()">₹<span id="uBal">0.00</span></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="openM('depM')" style="flex:1; padding:15px; background:var(--green); border:none; border-radius:12px; color:#000; font-weight:900;">DEPOSIT</button>
            <button onclick="openM('witM')" style="flex:1; padding:15px; background:var(--red); border:none; border-radius:12px; color:#fff; font-weight:900;">WITHDRAW</button>
        </div>
    </div>

    <div class="game-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><small style="opacity:0.5;">PERIOD</small><br><b id="period" style="font-size:18px;">...</b></div>
            <div style="text-align:right;"><small style="opacity:0.5;">TIME LEFT</small><br><b id="timer" style="color:var(--accent); font-size:24px;">00:00</b></div>
        </div>
        
        <div class="color-btns">
            <button class="btn-main" style="background:var(--green);" onclick="openBet('Green')">Green</button>
            <button class="btn-main" style="background:var(--violet);" onclick="openBet('Violet')">Violet</button>
            <button class="btn-main" style="background:var(--red);" onclick="openBet('Red')">Red</button>
        </div>

        <div style="text-align:center; padding-top:10px; border-top:1px solid #252b52;">
            <small style="opacity:0.4;">RECENT RESULTS</small>
            <div id="trends" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<div id="betSheet" class="bet-sheet">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 id="selColor" style="margin:0;">Join Green</h3>
        <span onclick="closeBet()" style="font-size:24px; cursor:pointer;">&times;</span>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <div class="amt-chip selected" onclick="setAmt(10, this)">₹10</div>
        <div class="amt-chip" onclick="setAmt(100, this)">₹100</div>
        <div class="amt-chip" onclick="setAmt(500, this)">₹500</div>
        <div class="amt-chip" onclick="setAmt(1000, this)">₹1000</div>
    </div>
    <input type="number" id="customAmt" value="10" placeholder="Enter Custom Amount">
    <button class="place-btn" onclick="confirmBet()">PLACE ORDER</button>
</div>

<div id="depM" class="modal"><div class="modal-content">
    <h3 style="color:var(--green);">Deposit Fund</h3>
    <input type="number" id="dAmt" placeholder="Amount (Min ₹100)" oninput="drawQR()">
    <div id="qrBox" style="display:none; margin:15px 0;">
        <img id="qr" src="" style="width:180px; border:5px solid #fff; border-radius:10px;">
        <p style="font-size:11px; color:var(--accent);">poonamlondhe52-1@okhdfcbank</p>
    </div>
    <input type="text" id="dUTR" placeholder="12 Digit UTR / Ref No.">
    <button onclick="sendDep()" id="depSubmitBtn" style="width:100%; padding:15px; background:var(--green); border:none; color:#000; font-weight:900; border-radius:12px;">SUBMIT TO ADMIN</button>
    <p onclick="closeM('depM')" style="margin-top:15px; color:var(--red); cursor:pointer;">Cancel</p>
</div></div>

<div id="witM" class="modal"><div class="modal-content">
    <h3 style="color:var(--red);">Withdraw Cash</h3>
    <input type="number" id="wAmt" placeholder="Min ₹200">
    <input type="text" id="wUpi" placeholder="Enter UPI ID">
    <button onclick="sendWit()" style="width:100%; padding:15px; background:var(--red); border:none; color:white; font-weight:900; border-radius:12px;">CONFIRM PAYOUT</button>
    <p onclick="closeM('witM')" style="margin-top:15px; color:var(--red); cursor:pointer;">Close</p>
</div></div>

<div id="adminM" class="modal"><div class="modal-content" style="max-width:500px;">
    <h3>ADMIN HUB</h3>
    <div id="adminPool" style="background:#070a1a; padding:15px; border-radius:12px; margin-bottom:15px; font-size:12px;"></div>
    <div id="adminReqs" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
    <button onclick="closeM('adminM')" style="width:100%; padding:12px; background:var(--red); border:none; color:white; border-radius:10px;">EXIT</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
      authDomain: "my-colour-game-670af.firebaseapp.com",
      databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com",
      projectId: "my-colour-game-670af",
      storageBucket: "my-colour-game-670af.firebasestorage.app",
      messagingSenderId: "1098639199054",
      appId: "1:1098639199054:web:b34a5aa3120ec0dbc5ac1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('player_id') || ("U" + Math.floor(10000 + Math.random() * 90000));
    localStorage.setItem('player_id', uid);
    let bal = 0, currentBetColor = '', taps = 0;

    // Sync User
    db.ref('users/' + uid).on('value', s => {
        let d = s.val();
        if(!d) db.ref('users/'+uid).set({balance:0, id:uid});
        bal = d ? d.balance : 0;
        document.getElementById('uBal').innerText = bal.toFixed(2);
        document.getElementById('uID').innerText = "ID: " + uid;
    });

    // Timer Logic
    setInterval(() => {
        let n = new Date(), s = 60 - n.getSeconds();
        document.getElementById('timer').innerText = "00:" + (s < 10 ? "0"+s : s);
        document.getElementById('period').innerText = Math.floor(n.getTime()/10000);
        if(s === 1) processRound();
    }, 1000);

    // Attractive Betting Functions
    function openBet(c) {
        currentBetColor = c;
        document.getElementById('selColor').innerText = "Join " + c;
        document.getElementById('selColor').style.color = {Green:'#00e676', Red:'#ff5252', Violet:'#d500f9'}[c];
        document.getElementById('betSheet').classList.add('active');
    }
    function closeBet() { document.getElementById('betSheet').classList.remove('active'); }
    function setAmt(a, el) {
        document.getElementById('customAmt').value = a;
        document.querySelectorAll('.amt-chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }
    function confirmBet() {
        let a = parseFloat(document.getElementById('customAmt').value);
        if(a >= 10 && bal >= a) {
            db.ref('users/'+uid).update({ balance: bal - a });
            db.ref('active_bets').push({ uid, color: currentBetColor, amount: a, period: document.getElementById('period').innerText });
            alert("Bet Placed Successfully!");
            closeBet();
        } else { alert("Minimum ₹10 required or Low Balance!"); }
    }

    // Result Processing
    function processRound() {
        db.ref('active_bets').once('value', snap => {
            let win = "Green"; // Logic can be automated here
            db.ref('trends').push({ color: {Green:'#00e676', Red:'#ff5252', Violet:'#d500f9'}[win] });
            db.ref('active_bets').remove();
        });
    }

    // DEPOSIT SUBMIT FIX (Direct Push)
    function sendDep() {
        let amt = document.getElementById('dAmt').value;
        let utr = document.getElementById('dUTR').value;
        let btn = document.getElementById('depSubmitBtn');

        if(amt >= 100 && utr.length >= 10) {
            btn.innerText = "SENDING...";
            btn.disabled = true;

            // Direct push to Firebase
            db.ref('requests').push({
                type: 'Deposit',
                uid: uid,
                amt: amt,
                info: utr,
                status: 'pending',
                time: Date.now()
            }).then(() => {
                alert("Request Sent! Admin will verify soon.");
                btn.innerText = "SUBMIT TO ADMIN";
                btn.disabled = false;
                closeM('depM');
            }).catch(e => {
                alert("Error: " + e.message);
                btn.disabled = false;
            });
        } else {
            alert("Please enter valid Amount (Min 100) and UTR!");
        }
    }

    function sendWit() {
        let a = document.getElementById('wAmt').value;
        let u = document.getElementById('wUpi').value;
        if(a >= 200 && bal >= a) {
            db.ref('users/'+uid).update({balance: bal - a});
            db.ref('requests').push({type:'Withdraw', uid, amt:a, info:u});
            alert("Withdrawal Requested!");
            closeM('witM');
        }
    }

    function drawQR() {
        let a = document.getElementById('dAmt').value;
        if(a >= 10) {
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=poonamlondhe52-1@okhdfcbank%26am=${a}`;
            document.getElementById('qrBox').style.display = 'block';
        }
    }

    // Admin Access
    function adminGo() {
        taps++;
        if(taps >= 5) {
            if(prompt("Admin Key:") === "77759636477") { openM('adminM'); loadAdmin(); }
            taps = 0;
        } setTimeout(() => taps = 0, 3000);
    }

    function loadAdmin() {
        db.ref('requests').on('value', s => {
            let h = "<table>";
            s.forEach(r => {
                h += `<tr><td>${r.val().uid}</td><td>₹${r.val().amt}</td><td><button onclick="approve('${r.key}','${r.val().uid}',${r.val().amt})">Approve</button></td></tr>`;
            });
            document.getElementById('adminReqs').innerHTML = h + "</table>";
        });
    }

    function approve(k, u, a) {
        db.ref('users/'+u+'/balance').transaction(c => (c||0) + parseFloat(a));
        db.ref('requests/'+k).remove();
        alert("Approved!");
    }

    db.ref('trends').limitToLast(15).on('value', s => {
        let d = document.getElementById('trends'); d.innerHTML = "";
        s.forEach(x => { d.innerHTML += `<div class="trend-dot" style="background:${x.val().color}"></div>`; });
    });

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
