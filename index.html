<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1f3c; --bg: #070a1a; --accent: #ffc107; --green: #00e676; --red: #ff5252; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: #fff; user-select: none; }
        .top-nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #252b52; }
        .wallet-card { background: linear-gradient(145deg, #2b3270, #1a1f3c); margin: 15px; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #3f478a; }
        .bal-amt { font-size: 36px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .game-card { background: #151a33; margin: 15px; border-radius: 25px; padding: 20px; border: 1px solid #252b52; }
        .btn-main { border: none; padding: 18px; border-radius: 15px; font-weight: 900; color: #fff; cursor: pointer; flex: 1; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: #1a1f3c; padding: 20px; border-radius: 20px; width: 92%; max-width: 450px; border: 1px solid var(--accent); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #3f478a; background: #0c0f26; color: #fff; box-sizing: border-box; }
        .history-box { margin: 15px; background: #151a33; padding: 15px; border-radius: 20px; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #252b52; }
        .trend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin: 3px; }
        .invite-btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 50px; font-weight: 900; width: 85%; margin: 20px auto; cursor: pointer; display: block; }
        .appr-btn { background: var(--green); border: none; color: #000; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .rejt-btn { background: var(--red); border: none; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div id="mainUI">
    <div class="top-nav">
        <div style="font-weight:900; font-size:22px; color:var(--accent);">1CLUB PRO</div>
        <div id="uID" style="font-size:11px; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:15px;">ID: Loading...</div>
    </div>

    <div class="wallet-card">
        <small style="opacity:0.6;">AVAILABLE BALANCE</small>
        <div class="bal-amt" onclick="adminGo()">₹<span id="uBal">0.00</span></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="openM('depM')" style="flex:1; padding:15px; background:var(--green); border:none; border-radius:12px; font-weight:900; cursor:pointer;">DEPOSIT</button>
            <button onclick="openM('witM')" style="flex:1; padding:15px; background:var(--red); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer;">WITHDRAW</button>
        </div>
    </div>

    <div class="game-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <div><small style="opacity:0.5;">PERIOD</small><br><b id="period">...</b></div>
            <div style="text-align:right;"><small style="opacity:0.5;">TIME LEFT</small><br><b id="timer" style="color:var(--accent); font-size:24px;">00:00</b></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:var(--green);" onclick="openBet('Green')">Green</button>
            <button class="btn-main" style="background:var(--red);" onclick="openBet('Red')">Red</button>
        </div>
        <div id="trends" style="margin-top:20px; text-align:center;"></div>
    </div>

    <button class="invite-btn" onclick="copyReferral()">🎁 INVITE FRIENDS (10% BONUS)</button>

    <div class="history-box">
        <h3 style="margin:0; font-size:14px; color:var(--accent);">MY GAME HISTORY</h3>
        <div id="betHistory">History loading...</div>
    </div>
</div>

<div id="adminM" class="modal"><div class="modal-content">
    <h2 style="color:var(--accent);">ADMIN DASHBOARD</h2>
    <div id="poolInfo" style="background:#000; padding:10px; color:var(--green); margin-bottom:15px;"></div>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button onclick="setManual('Green')" style="flex:1; background:var(--green); padding:10px; border-radius:8px; font-weight:bold;">WIN G</button>
        <button onclick="setManual('Red')" style="flex:1; background:var(--red); padding:10px; border-radius:8px; font-weight:bold; color:#fff;">WIN R</button>
    </div>
    <h4 style="text-align:left;">DEPOSIT REQUESTS</h4>
    <div style="overflow-x:auto;"><table>
        <thead><tr><th>User</th><th>Amt</th><th>UTR</th><th>Action</th></tr></thead>
        <tbody id="adminReqsBody"></tbody>
    </table></div>
    <button onclick="closeM('adminM')" style="width:100%; margin-top:20px; padding:12px; background:#444; color:#fff; border:none; border-radius:10px;">CLOSE</button>
</div></div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>DEPOSIT FUNDS</h3>
    <input type="number" id="dAmt" placeholder="Enter Amount (Min 100)" oninput="drawQR()">
    <div id="qrBox" style="display:none; margin:15px 0;">
        <img id="qr" style="width:180px; border:5px solid #fff; border-radius:10px;">
        <p style="font-size:10px; margin-top:5px; color:var(--accent);">UPI: 8149647409@ptaxis</p>
    </div>
    <input type="text" id="dUTR" placeholder="Enter 12 Digit UTR Number">
    <button onclick="sendDep()" style="width:100%; background:var(--green); padding:15px; border:none; border-radius:12px; font-weight:900;">SUBMIT DEPOSIT</button>
    <p onclick="closeM('depM')" style="color:var(--red); cursor:pointer; margin-top:15px;">Cancel</p>
</div></div>

<div id="witM" class="modal"><div class="modal-content">
    <h3>WITHDRAW FUNDS</h3>
    <input type="number" id="wAmt" placeholder="Minimum 200">
    <input type="text" id="wUpi" placeholder="Enter UPI ID for Payment">
    <button onclick="sendWit()" style="width:100%; background:var(--red); padding:15px; border:none; border-radius:12px; color:#fff; font-weight:900;">SUBMIT WITHDRAWAL</button>
    <p onclick="closeM('witM')" style="color:var(--red); cursor:pointer; margin-top:15px;">Cancel</p>
</div></div>

<div id="betM" class="modal"><div class="modal-content">
    <h3 id="selColor">Bet</h3>
    <input type="number" id="betAmt" value="10">
    <button onclick="confirmBet()" style="width:100%; background:var(--green); padding:15px; border:none; border-radius:12px; font-weight:bold;">CONFIRM</button>
    <p onclick="closeM('betM')" style="color:var(--red); cursor:pointer; margin-top:15px;">Cancel</p>
</div></div>

<div id="resultM" class="modal"><div class="modal-content">
    <div id="resIcon" style="font-size:60px;"></div>
    <div id="resTitle" style="font-size:28px; font-weight:800; margin:10px 0;"></div>
    <div id="resBody" style="margin-bottom:20px; font-size:18px;"></div>
    <button onclick="closeM('resultM')" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold;">OKAY</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
      authDomain: "my-colour-game-670af.firebaseapp.com",
      databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com",
      projectId: "my-colour-game-670af",
      storageBucket: "my-colour-game-670af.firebasestorage.app",
      messagingSenderId: "1098639199054",
      appId: "1:1098639199054:web:b34a5aa3120ec0dbc5ac1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // FIX: Data persistence on refresh
    let uid = localStorage.getItem('CLUB_USER_ID_v99') || ("ID"+Math.floor(1000+Math.random()*8999));
    localStorage.setItem('CLUB_USER_ID_v99', uid);
    let bal = 0, currentBetCol = '', taps = 0;

    db.ref('users/' + uid).on('value', s => {
        let d = s.val(); if(!d) db.ref('users/'+uid).set({balance:0, id:uid});
        bal = d ? d.balance : 0;
        document.getElementById('uBal').innerText = bal.toFixed(2);
        document.getElementById('uID').innerText = "ID: " + uid;
    });

    setInterval(() => {
        let n = new Date(), s = 60 - n.getSeconds();
        let p = Math.floor(n.getTime()/60000);
        document.getElementById('timer').innerText = "00:" + (s < 10 ? "0"+s : s);
        document.getElementById('period').innerText = p;
        if(s === 1) processGame(p);
    }, 1000);

    function openBet(c) { currentBetCol = c; document.getElementById('selColor').innerText = "Join " + c; openM('betM'); }
    function confirmBet() {
        let a = parseFloat(document.getElementById('betAmt').value);
        let p = document.getElementById('period').innerText;
        if(a >= 10 && bal >= a) {
            db.ref('users/'+uid).update({ balance: bal - a });
            db.ref('active_bets/'+p+'/'+uid).push({ color: currentBetCol, amount: a });
            db.ref('history/'+uid+'/'+p).set({ color: 'Pending', status: 'Pending', amount: a });
            closeM('betM');
        } else alert("Balance Low!");
    }

    function processGame(p) {
        db.ref('active_bets/'+p).once('value', snap => {
            db.ref('admin/manual').once('value', ms => {
                let pool = { Green: 0, Red: 0 };
                if(snap.exists()) snap.forEach(u => u.forEach(b => pool[b.val().color] += b.val().amount));
                let win = ms.val() || (pool.Green <= pool.Red ? 'Green' : 'Red');

                if(snap.exists()) {
                    snap.forEach(userNode => {
                        let uKey = userNode.key, winAmt = 0;
                        userNode.forEach(bet => { if(bet.val().color === win) winAmt += (bet.val().amount * 1.9); });
                        if(winAmt > 0) db.ref('users/'+uKey+'/balance').transaction(c => (c||0) + winAmt);
                        db.ref('history/'+uKey+'/'+p).update({ status: winAmt > 0 ? 'Win' : 'Loss', color: win, res: win });
                        if(uKey === uid) setTimeout(() => showFinalPopup(winAmt > 0 ? 'Win' : 'Loss', winAmt, win), 1500);
                    });
                }
                db.ref('trends').push({ color: win === 'Red' ? '#ff5252' : '#00e676' });
                db.ref('admin/manual').set(null);
            });
        });
    }

    function showFinalPopup(st, amt, clr) {
        let icon = document.getElementById('resIcon'), title = document.getElementById('resTitle'), body = document.getElementById('resBody');
        icon.innerText = st === 'Win' ? "🏆" : "❌";
        title.innerText = st === 'Win' ? "WINNER!" : "LOSS";
        title.style.color = st === 'Win' ? "#00e676" : "#ff5252";
        body.innerHTML = `Result: ${clr}<br>${st === 'Win' ? 'Won: ₹'+amt.toFixed(2) : 'Better luck next time!'}`;
        openM('resultM');
    }

    function drawQR() {
        let a = document.getElementById('dAmt').value;
        if(a >= 100) {
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=8149647409@ptaxis%26am=${a}%26cu=INR`;
            document.getElementById('qrBox').style.display = 'block';
        } else { document.getElementById('qrBox').style.display = 'none'; }
    }

    function sendDep() {
        let a = document.getElementById('dAmt').value, u = document.getElementById('dUTR').value;
        if(a >= 100 && u.length >= 10) {
            db.ref('requests').push({ uid, amt: a, info: u, type: 'Deposit', timestamp: Date.now() });
            alert("Deposit Request Sent!"); closeM('depM');
        } else alert("Invalid Input!");
    }

    function sendWit() {
        let a = document.getElementById('wAmt').value, u = document.getElementById('wUpi').value;
        if(a >= 200 && bal >= a) {
            db.ref('users/'+uid).update({ balance: bal - a });
            db.ref('requests').push({ uid, amt: a, info: u, type: 'Withdraw', timestamp: Date.now() });
            alert("Withdrawal Request Sent!"); closeM('witM');
        } else alert("Balance Low or Invalid Input!");
    }

    function adminGo() { taps++; if(taps >= 5) { if(prompt("Pass:") === "77759636477") { openM('adminM'); loadAdmin(); } taps = 0; } }
    function loadAdmin() {
        db.ref('requests').on('value', s => {
            let html = "";
            s.forEach(r => {
                let d = r.val();
                html += `<tr><td>${d.uid}</td><td>₹${d.amt}</td><td>${d.info}</td>
                <td><button class="appr-btn" onclick="apprReq('${r.key}','${d.uid}',${d.amt},'${d.type}')">✔</button>
                <button class="rejt-btn" onclick="rejReq('${r.key}')">✖</button></td></tr>`;
            });
            document.getElementById('adminReqsBody').innerHTML = html || "<tr><td colspan='4'>No Requests</td></tr>";
        });
    }
    function apprReq(k, u, a, t) { if(t === 'Deposit') db.ref('users/'+u+'/balance').transaction(c => (c||0) + parseFloat(a)); db.ref('requests/'+k).remove(); alert("Done!"); }
    function rejReq(k) { db.ref('requests/'+k).remove(); }
    function setManual(c) { db.ref('admin/manual').set(c); alert("Next Win: " + c); }

    db.ref('history/'+uid).limitToLast(10).on('value', s => {
        let h = "<table><tr><th>Period</th><th>Res</th><th>Status</th></tr>";
        s.forEach(x => { let v = x.val(); h += `<tr><td>${x.key}</td><td>${v.color || '-'}</td><td style="color:${v.status=='Win'?'#00e676':'#ff5252'}">${v.status}</td></tr>`; });
        document.getElementById('betHistory').innerHTML = h + "</table>";
    });

    db.ref('trends').limitToLast(20).on('value', s => {
        let d = document.getElementById('trends'); d.innerHTML = "";
        s.forEach(x => { d.innerHTML += `<div class="trend-dot" style="background:${x.val().color}"></div>`; });
    });

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function copyReferral() { navigator.clipboard.writeText(window.location.href); alert("Referral Link Copied!"); }
</script>
</body>
</html>
