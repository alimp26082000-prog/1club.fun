<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1f3c; --bg: #070a1a; --accent: #ffc107; --green: #00e676; --red: #ff5252; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: #fff; user-select: none; }
        .top-nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #252b52; }
        .wallet-card { background: linear-gradient(145deg, #2b3270, #1a1f3c); margin: 15px; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #3f478a; }
        .bal-amt { font-size: 36px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .game-card { background: #151a33; margin: 15px; border-radius: 25px; padding: 20px; border: 1px solid #252b52; }
        .btn-main { border: none; padding: 18px; border-radius: 15px; font-weight: 900; color: #fff; cursor: pointer; flex: 1; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: #1a1f3c; padding: 20px; border-radius: 20px; width: 92%; max-width: 450px; border: 1px solid var(--accent); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #3f478a; background: #0c0f26; color: #fff; box-sizing: border-box; }
        .history-box { margin: 15px; background: #151a33; padding: 15px; border-radius: 20px; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #252b52; }
        .trend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin: 3px; }
    </style>
</head>
<body>

<div id="mainUI">
    <div class="top-nav">
        <div style="font-weight:900; font-size:22px; color:var(--accent);">1CLUB PRO</div>
        <div id="uID" style="font-size:11px; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:15px;">ID: Loading...</div>
    </div>

    <div class="wallet-card">
        <small style="opacity:0.6;">AVAILABLE BALANCE</small>
        <div class="bal-amt" onclick="adminGo()">₹<span id="uBal">0.00</span></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="openM('depM')" style="flex:1; padding:15px; background:var(--green); border:none; border-radius:12px; font-weight:900; cursor:pointer;">DEPOSIT</button>
            <button onclick="openM('witM')" style="flex:1; padding:15px; background:var(--red); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer;">WITHDRAW</button>
        </div>
    </div>

    <div class="game-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <div><small style="opacity:0.5;">PERIOD</small><br><b id="period">...</b></div>
            <div style="text-align:right;"><small style="opacity:0.5;">TIME LEFT</small><br><b id="timer" style="color:var(--accent); font-size:24px;">00:00</b></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:var(--green);" onclick="openBet('Green')">Green</button>
            <button class="btn-main" style="background:var(--red);" onclick="openBet('Red')">Red</button>
        </div>
        <div id="trends" style="margin-top:20px; text-align:center;"></div>
    </div>

    <div class="history-box">
        <h3 style="margin:0; font-size:14px; color:var(--accent);">MY GAME HISTORY</h3>
        <div id="betHistory">History loading...</div>
    </div>
</div>

<div id="adminM" class="modal"><div class="modal-content">
    <h2 style="color:var(--accent);">ADMIN PANEL</h2>
    <div id="poolDisplay" style="background:#000; padding:15px; color:var(--green); margin-bottom:15px; font-size:18px; border-radius:10px;">
        TOTAL BETS:<br>
        <span style="color:var(--green);">GREEN: ₹<span id="pG">0</span></span> | 
        <span style="color:var(--red);">RED: ₹<span id="pR">0</span></span>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button onclick="setManual('Green')" style="flex:1; background:var(--green); padding:12px; border-radius:8px; font-weight:bold;">WIN GREEN</button>
        <button onclick="setManual('Red')" style="flex:1; background:var(--red); padding:12px; border-radius:8px; font-weight:bold; color:#fff;">WIN RED</button>
    </div>
    <div id="adminReqsBody" style="max-height:200px; overflow-y:auto;"></div>
    <button onclick="closeM('adminM')" style="width:100%; margin-top:20px; padding:12px; background:#444; color:#fff; border:none; border-radius:10px;">CLOSE</button>
</div></div>

<div id="resultM" class="modal"><div class="modal-content">
    <div id="resIcon" style="font-size:60px;"></div>
    <div id="resTitle" style="font-size:28px; font-weight:800; margin:10px 0;"></div>
    <div id="resBody" style="margin-bottom:20px; font-size:18px;"></div>
    <button onclick="closeM('resultM')" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold;">OKAY</button>
</div></div>

<div id="betM" class="modal"><div class="modal-content">
    <h3 id="selColor">Bet</h3>
    <input type="number" id="betAmt" value="10">
    <button onclick="confirmBet()" style="width:100%; background:var(--green); padding:15px; border:none; border-radius:12px; font-weight:bold;">CONFIRM</button>
    <p onclick="closeM('betM')" style="color:var(--red); cursor:pointer; margin-top:15px;">Cancel</p>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
      authDomain: "my-colour-game-670af.firebaseapp.com",
      databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com",
      projectId: "my-colour-game-670af",
      storageBucket: "my-colour-game-670af.firebasestorage.app",
      messagingSenderId: "1098639199054",
      appId: "1:1098639199054:web:b34a5aa3120ec0dbc5ac1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('CLUB_USER_ID_v102') || ("ID"+Math.floor(1000+Math.random()*8999));
    localStorage.setItem('CLUB_USER_ID_v102', uid);
    let bal = 0, currentBetCol = '', lastPeriod = 0;

    db.ref('users/' + uid).on('value', s => {
        let d = s.val(); if(!d) db.ref('users/'+uid).set({balance:0, id:uid});
        bal = d ? d.balance : 0;
        document.getElementById('uBal').innerText = bal.toFixed(2);
        document.getElementById('uID').innerText = "ID: " + uid;
    });

    setInterval(() => {
        let now = Date.now();
        let s = 60 - Math.floor((now / 1000) % 60);
        let p = Math.floor(now / 60000);
        document.getElementById('timer').innerText = "00:" + (s < 10 ? "0"+s : s);
        document.getElementById('period').innerText = p;

        if (s === 1 && lastPeriod !== p) {
            lastPeriod = p;
            calculateWinner(p);
        }
    }, 1000);

    function calculateWinner(p) {
        db.ref('global_result/' + p).transaction(curr => {
            if (curr === null) {
                db.ref('admin/manual').once('value', ms => {
                    db.ref('active_bets/' + p).once('value', snap => {
                        let totalPool = { Green: 0, Red: 0 };
                        // Loop through all users and all bets to get TRUE TOTAL
                        snap.forEach(userNode => {
                            userNode.forEach(betNode => {
                                let b = betNode.val();
                                totalPool[b.color] += parseFloat(b.amount);
                            });
                        });
                        
                        let win = ms.val() || (totalPool.Green <= totalPool.Red ? 'Green' : 'Red');
                        
                        db.ref('global_result/' + p).set({ win: win });
                        db.ref('trends').push({ color: win === 'Red' ? '#ff5252' : '#00e676' });
                        db.ref('admin/manual').set(null);
                    });
                });
            }
        });
    }

    db.ref('global_result').on('child_added', snap => {
        let p = snap.key, win = snap.val().win;
        db.ref('active_bets/'+p+'/'+uid).once('value', s => {
            if(s.exists()) {
                let totalWinAmt = 0;
                s.forEach(b => { if(b.val().color === win) totalWinAmt += (b.val().amount * 1.9); });
                if(totalWinAmt > 0) db.ref('users/'+uid+'/balance').transaction(c => (c||0) + totalWinAmt);
                db.ref('history/'+uid+'/'+p).update({ status: totalWinAmt > 0 ? 'Win' : 'Loss', res: win });
                showFinalPopup(totalWinAmt > 0 ? 'Win' : 'Loss', totalWinAmt, win);
            }
        });
    });

    function showFinalPopup(st, amt, clr) {
        let icon = document.getElementById('resIcon'), title = document.getElementById('resTitle');
        icon.innerText = st === 'Win' ? "🏆" : "❌";
        title.innerText = st === 'Win' ? "WINNER!" : "LOSS";
        title.style.color = st === 'Win' ? "#00e676" : "#ff5252";
        document.getElementById('resBody').innerHTML = `Result: ${clr}<br>₹${amt.toFixed(2)}`;
        openM('resultM');
    }

    function openBet(c) { currentBetCol = c; document.getElementById('selColor').innerText = "Join " + c; openM('betM'); }
    function confirmBet() {
        let a = parseFloat(document.getElementById('betAmt').value);
        let p = document.getElementById('period').innerText;
        if(a >= 10 && bal >= a) {
            db.ref('users/'+uid).update({ balance: bal - a });
            db.ref('active_bets/'+p+'/'+uid).push({ color: currentBetCol, amount: a });
            db.ref('history/'+uid+'/'+p).set({ bet: currentBetCol, status: 'Pending', amount: a });
            closeM('betM');
        } else alert("Low Balance!");
    }

    // ADMIN: Real-time Total Pool Tracker
    function adminGo() { if(prompt("Pass:") === "77759636477") { openM('adminM'); trackLivePool(); } }
    
    function trackLivePool() {
        let p = document.getElementById('period').innerText;
        db.ref('active_bets/'+p).on('value', s => {
            let totalG = 0, totalR = 0;
            s.forEach(userNode => {
                userNode.forEach(betNode => {
                    let b = betNode.val();
                    if(b.color === 'Green') totalG += parseFloat(b.amount);
                    else totalR += parseFloat(b.amount);
                });
            });
            document.getElementById('pG').innerText = totalG.toFixed(2);
            document.getElementById('pR').innerText = totalR.toFixed(2);
        });
    }

    function setManual(c) { db.ref('admin/manual').set(c); alert("Next Win Fixed: " + c); }

    db.ref('history/'+uid).limitToLast(10).on('value', s => {
        let h = "<table><tr><th>Period</th><th>Bet</th><th>Res</th><th>Status</th></tr>";
        s.forEach(x => { let v = x.val(); h += `<tr><td>${x.key}</td><td>${v.bet}</td><td>${v.res||'-'}</td><td style="color:${v.status=='Win'?'#00e676':'#ff5252'}">${v.status}</td></tr>`; });
        document.getElementById('betHistory').innerHTML = h + "</table>";
    });

    db.ref('trends').limitToLast(15).on('value', s => {
        let d = document.getElementById('trends'); d.innerHTML = "";
        s.forEach(x => { d.innerHTML += `<div class="trend-dot" style="background:${x.val().color}"></div>`; });
    });

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
