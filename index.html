<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1CLUB PRO - Official</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root { --primary:#fb5153; --bg:#f5f6fa; --green:#2ecc71; --red:#e74c3c; --violet:#9b59b6; --gold:#fbc531; --orange:#ffa502; }
body{font-family:'Poppins',sans-serif;background:var(--bg);margin:0;padding-bottom:80px;}
.header{background:var(--primary);padding:15px;color:#fff;display:flex;justify-content:space-between;font-weight:800}
.wallet-box{background:#fff;margin:15px;border-radius:20px;padding:20px;text-align:center}
.bal-amt{font-size:30px;font-weight:800;margin:10px 0;cursor:pointer}
.game-area{background:#fff;margin:15px;border-radius:20px;padding:15px}
.timer-box{display:flex;justify-content:space-between;background:#fff5f5;padding:10px;border-radius:12px;margin-bottom:20px}
.grid-btn{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}
.btn{border:none;padding:12px;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}
.num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
.n-btn{border:2px solid #ddd;background:#fff;padding:10px;border-radius:50%;font-weight:bold;width:45px;height:45px;display:flex;align-items:center;justify-content:center;margin:auto}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
table{width:100%;font-size:12px;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid #eee;padding:8px;text-align:center}

/* Navigation */
.nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; }
.nav-item { text-align: center; font-size: 11px; color: #666; cursor: pointer; flex: 1; }
.nav-item img { width: 24px; display: block; margin: 0 auto 4px; }

/* Modals */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:5000;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:15px;width:90%;max-height:85vh;overflow-y:auto}
input{width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;}

/* Popup Styles */
.win-bg { background: linear-gradient(135deg, #2ecc71, #27ae60); color:white; text-align:center;}
.loss-bg { background: linear-gradient(135deg, #e74c3c, #c0392b); color:white; text-align:center;}
#qrcode { display: flex; justify-content: center; margin: 15px 0; }
</style>
</head>

<body>

<div class="header">
    <span>1CLUB PRO</span>
    <span id="uID">ID: --</span>
</div>

<div class="wallet-box">
    <small>Wallet Balance</small>
    <div class="bal-amt" onclick="checkAdmin()">₹<span id="uBal">0.00</span></div>
</div>

<div class="game-area">
    <div class="timer-box">
        <div><small style="color:red;">Period</small><br><b id="period">----</b></div>
        <div style="text-align:right;"><small>Time Left</small><br><b id="timer">00:00</b></div>
    </div>
    <div class="grid-btn">
        <button class="btn" style="background:var(--green)" onclick="betPopup('Green')">Green</button>
        <button class="btn" style="background:var(--violet)" onclick="betPopup('Violet')">Violet</button>
        <button class="btn" style="background:var(--red)" onclick="betPopup('Red')">Red</button>
    </div>
    <div id="nums" class="num-grid"></div>
    <div class="bs-grid">
        <button class="btn" style="background:#ffa502" onclick="betPopup('Big')">Big</button>
        <button class="btn" style="background:#2f3542" onclick="betPopup('Small')">Small</button>
    </div>
</div>

<div class="game-area">
    <h4>History (Last 20 Results)</h4>
    <table id="resTable"></table>
</div>

<div class="nav-bar">
    <div class="nav-item" onclick="openM('depM')"><b>💰</b><br>Deposit</div>
    <div class="nav-item" onclick="openM('witM')"><b>🏧</b><br>Withdraw</div>
    <div class="nav-item" onclick="openInvite()"><b>👥</b><br>Invite</div>
    <div class="nav-item" onclick="location.reload()"><b>🏠</b><br>Home</div>
</div>

<div id="depM" class="modal">
    <div class="modal-content">
        <h3>Deposit Money</h3>
        <input type="number" id="depAmt" placeholder="Enter Amount">
        <button class="btn" style="background:var(--primary); width:100%" onclick="genQR()">Generate QR</button>
        <div id="qrcode"></div>
        <div id="utrArea" style="display:none">
            <p style="font-size:12px; color:red;">Pay to QR and enter UTR/Ref No. below:</p>
            <input type="text" id="utrNum" placeholder="Enter 12 Digit UTR Number">
            <button class="btn" style="background:var(--green); width:100%" onclick="subDep()">Submit Deposit</button>
        </div>
        <button class="btn" style="background:#333; width:100%; margin-top:10px;" onclick="closeM('depM')">Close</button>
    </div>
</div>

<div id="witM" class="modal">
    <div class="modal-content">
        <h3>Withdraw Money</h3>
        <input type="number" id="witAmt" placeholder="Enter Amount">
        <input type="text" id="witUpi" placeholder="Enter your UPI ID">
        <button class="btn" style="background:var(--primary); width:100%" onclick="subWit()">Submit Withdrawal</button>
        <button class="btn" style="background:#333; width:100%; margin-top:10px;" onclick="closeM('witM')">Close</button>
    </div>
</div>

<div id="resModal" class="modal">
    <div id="resBox" class="modal-content">
        <h2 id="resStatus">WINNING</h2>
        <div id="resAmt" style="font-size:30px; font-weight:800;">+₹0.00</div>
        <button class="btn" style="background:#fff; color:#333; width:100%; margin-top:15px;" onclick="closeM('resModal')">Close</button>
    </div>
</div>

<div id="adminM" class="modal">
    <div class="modal-content">
        <h3>ADMIN CONTROL</h3>
        <div id="adminReqs">Loading...</div>
        <button class="btn" style="background:#333; width:100%" onclick="closeM('adminM')">Close</button>
    </div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
authDomain:"my-colour-game-670af.firebaseapp.com",
databaseURL:"https://my-colour-game-670af-default-rtdb.firebaseio.com",
projectId:"my-colour-game-670af"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let uid=localStorage.getItem('UID')||"U"+Math.floor(1000+Math.random()*9000);
localStorage.setItem('UID',uid);

let myBet = null; // Track if user placed a bet

// Timer Logic
function startTimer() {
    setInterval(() => {
        let now = new Date();
        let sec = 60 - now.getSeconds();
        document.getElementById('timer').innerText = "00:" + sec.toString().padStart(2, '0');
        document.getElementById('period').innerText = now.getFullYear().toString() + (now.getMonth()+1) + now.getDate() + (now.getHours()*60 + now.getMinutes());
        
        if(sec === 59 && myBet) {
            // Check result and show popup (Dummy for now, triggered by data update)
            showResult(true, 100); 
            myBet = null; 
        }
    }, 1000);
}
startTimer();

// Deposit Functions
function genQR() {
    let amt = document.getElementById('depAmt').value;
    if(!amt || amt < 10) return alert("Min Deposit ₹10");
    document.getElementById('qrcode').innerHTML = "";
    let upi = `upi://pay?pa=YOUR_UPI_ID@okicici&pn=1CLUB%20PRO&am=${amt}&cu=INR`; 
    new QRCode(document.getElementById("qrcode"), { text: upi, width: 180, height: 180 });
    document.getElementById('utrArea').style.display = "block";
}

function subDep() {
    let amt = document.getElementById('depAmt').value;
    let utr = document.getElementById('utrNum').value;
    if(utr.length < 10) return alert("Sahi UTR number daalein");
    db.ref('requests').push({ uid: uid, amt: amt, utr: utr, type: 'Deposit', status: 'Pending' });
    alert("Request Sent! Admin approve karega.");
    closeM('depM');
}

// Withdraw Function
function subWit() {
    let amt = document.getElementById('witAmt').value;
    let upi = document.getElementById('witUpi').value;
    if(amt < 100) return alert("Min Withdrawal ₹100");
    db.ref('requests').push({ uid: uid, amt: amt, upi: upi, type: 'Withdraw', status: 'Pending' });
    alert("Withdrawal Request Sent!");
    closeM('witM');
}

function openInvite() {
    let link = window.location.href + "?ref=" + uid;
    navigator.clipboard.writeText(link);
    alert("Referral Link Copied: " + link);
}

function betPopup(t){ 
    alert("Bet placed on: " + t); 
    myBet = t; 
}

function showResult(isWin, amount) {
    let box = document.getElementById('resBox');
    box.className = isWin ? "modal-content win-bg" : "modal-content loss-bg";
    document.getElementById('resStatus').innerText = isWin ? "WINNING" : "LOSS";
    document.getElementById('resAmt').innerText = (isWin ? "+₹" : "-₹") + amount;
    openM('resModal');
}

// Global UI Stuff
db.ref('users/'+uid).on('value',s=>{
    let b = (s.val()&&s.val().balance)||0;
    document.getElementById('uBal').innerText=b.toFixed(2);
    document.getElementById('uID').innerText="ID: "+uid;
});

db.ref('global_res').limitToLast(20).on('value', snap => {
    let h = `<tr><th>Period</th><th>Number</th><th>Colour</th><th>Size</th></tr>`;
    let rows = []; snap.forEach(c => rows.push({p:c.key, ...c.val()}));
    rows.reverse().forEach(d => {
        h += `<tr><td>${d.p}</td><td>${d.num}</td><td style="color:var(--${d.win.toLowerCase()})">${d.win}</td><td>${d.size}</td></tr>`;
    });
    document.getElementById('resTable').innerHTML = h;
});

function checkAdmin(){ if(prompt("Admin Password")=="77759636477"){ openM('adminM'); loadAdmin(); } }

function loadAdmin() {
    db.ref('requests').on('value', snap => {
        let h = "<table><tr><th>ID/UTR</th><th>Amt</th><th>Action</th></tr>";
        snap.forEach(r => {
            let d = r.val();
            h += `<tr><td>${d.uid}<br><small>${d.utr || d.upi}</small></td><td>${d.amt}</td>
            <td><button onclick="approve('${r.key}','${d.uid}',${d.amt},'${d.type}')">✔</button></td></tr>`;
        });
        h += "</table>";
        document.getElementById('adminReqs').innerHTML = h;
    });
}

function approve(k, u, a, t) {
    if(t == 'Deposit') db.ref('users/'+u+'/balance').transaction(c => (c||0) + parseFloat(a));
    db.ref('requests/'+k).remove();
}

let nH="";
for(let i=0;i<=9;i++){
    let c=(i%2==0)?'red':'green'; if(i==0||i==5)c='violet';
    nH+=`<button class="n-btn" style="color:${c};border-color:${c}" onclick="betPopup('${i}')">${i}</button>`;
}
document.getElementById('nums').innerHTML=nH;
function openM(id){ document.getElementById(id).style.display="flex"; }
function closeM(id){ document.getElementById(id).style.display="none"; }
</script>

</body>
</html>
