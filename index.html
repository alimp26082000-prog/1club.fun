<div id="depM" class="modal"><div class="modal-content" style="text-align:center;">
    <h3 style="color:var(--green);">DEPOSIT MONEY</h3>
    
    <input type="number" id="dAmount" placeholder="Enter Amount (₹)" style="width:90%; text-align:center;" oninput="updateQR()">
    
    <div id="qrContainer" style="margin:15px auto; padding:10px; background:white; width:150px; height:150px; display:none; border-radius:10px;">
        <img id="qrImg" src="" style="width:100%; height:100%;">
    </div>

    <p style="font-size:13px; margin:10px 0;">UPI ID: <b style="color:var(--gold);">Poonamlondhe52-1@okhdfcbank</b></p>
    
    <input type="text" id="utrInput" placeholder="Enter 12-Digit UTR Number" style="width:90%;">
    
    <button class="main-btn" style="width:100%; margin-top:15px;" onclick="submitDeposit()">SUBMIT REQUEST</button>
    <button onclick="closeM('depM')" style="background:none; border:none; color:#777; margin-top:10px;">Cancel</button>
</div></div>

<div id="adminM" class="modal"><div class="modal-content">
    <h2 style="color:var(--primary); text-align:center;">MASTER CONTROL</h2>
    
    <div style="background:#000; padding:10px; border-radius:10px; border:1px solid #333;">
        <h4 style="color:var(--gold); margin-top:0;">Pending Deposit Requests</h4>
        <div id="adminDepList" style="font-size:12px; max-height:300px; overflow-y:auto;">
            Loading requests...
        </div>
    </div>

    <button class="action-btn" style="width:100%; margin-top:20px; background:#333;" onclick="closeM('adminM')">Close Panel</button>
</div></div>

<script>
    const MY_UPI = "Poonamlondhe52-1@okhdfcbank";

    // 1. QR Code Logic
    function updateQR() {
        let amt = document.getElementById('dAmount').value;
        let qrBox = document.getElementById('qrContainer');
        let qrImg = document.getElementById('qrImg');
        
        if(amt > 0) {
            // Generates Google Pay/PhonePe compatible QR
            let url = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=${MY_UPI}%26am=${amt}%26cu=INR`;
            qrImg.src = url;
            qrBox.style.display = "block";
        } else {
            qrBox.style.display = "none";
        }
    }

    // 2. Submit Deposit
    function submitDeposit() {
        let amt = document.getElementById('dAmount').value;
        let utr = document.getElementById('utrInput').value;
        
        if(amt < 10 || utr.length < 10) {
            alert("Please enter valid Amount and UTR!");
            return;
        }

        db.ref('admin/deposits').push({
            uid: uid,
            amt: amt,
            utr: utr,
            status: "pending",
            time: Date.now()
        }).then(() => {
            alert("Request Sent! Wait for Admin approval.");
            closeM('depM');
        });
    }

    // 3. Admin Control (Accept/Reject)
    function loadAdminRequests() {
        db.ref('admin/deposits').on('value', (snapshot) => {
            const list = document.getElementById('adminDepList');
            list.innerHTML = "";
            if(!snapshot.exists()) { list.innerHTML = "No new requests"; return; }

            snapshot.forEach((child) => {
                let data = child.val();
                list.innerHTML += `
                <div style="border-bottom:1px solid #222; padding:10px 0;">
                    <b>Amt:</b> ₹${data.amt} | <b>UTR:</b> ${data.utr} <br>
                    <button onclick="handleReq('${child.key}', '${data.uid}', ${data.amt}, 'accept')" style="color:lime; background:none; border:1px solid lime; padding:2px 5px; margin-top:5px; cursor:pointer;">ACCEPT</button>
                    <button onclick="handleReq('${child.key}', null, null, 'reject')" style="color:red; background:none; border:1px solid red; padding:2px 5px; margin-left:10px; cursor:pointer;">REJECT</button>
                </div>`;
            });
        });
    }

    function handleReq(key, user, amount, action) {
        if(action === 'accept') {
            db.ref('users/'+user+'/balance').transaction((curr) => (curr || 0) + parseFloat(amount));
            alert("Deposit Accepted! Balance Added.");
        } else {
            alert("Request Rejected.");
        }
        db.ref('admin/deposits/'+key).remove();
    }

    // Trigger Admin Data when panel opens
    // (Inside your existing admin login logic)
    // loadAdminRequests();
</script>
