      <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fb5153; --bg: #f5f6fa; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; --gold: #fbc531; --orange: #ffa502; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; user-select: none; }
        .header { background: var(--primary); padding: 15px; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .wallet-box { background: #fff; margin: 15px; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .bal-amt { font-size: 30px; font-weight: 800; margin: 10px 0; cursor: pointer; }
        .game-area { background: #fff; margin: 15px; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .timer-box { display: flex; justify-content: space-between; background: #fff5f5; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .grid-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .n-btn { border: 2px solid #ddd; background: #fff; padding: 10px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .invite-card { background: var(--gold); padding: 15px; border-radius: 15px; margin: 15px; text-align: center; font-weight: 800; cursor: pointer; color: #000; }
        
        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 15px; width: 90%; max-height: 85vh; overflow-y: auto; text-align: center; }

        /* Deposit Styles */
        .amt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .amt-btn { border: 1px solid #ddd; padding: 10px; border-radius: 5px; cursor: pointer; color: var(--primary); }
        .amt-btn.active { border-color: var(--primary); background: #fff0f0; }

        /* Betting Sheet */
        .bet-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-radius: 25px 25px 0 0; z-index: 6000; display: none; flex-direction: column; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .bet-head { background: var(--orange); padding: 15px; color: #fff; border-radius: 25px 25px 0 0; font-weight: bold; }

        /* Status Popups */
        .win-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9000; align-items: center; justify-content: center; }
        .win-card { background: linear-gradient(180deg, #ff4757, #ff6b81); width: 85%; border-radius: 30px; padding: 30px 15px; text-align: center; color: white; }
        .win-card.green-bg { background: linear-gradient(180deg, #2ecc71, #27ae60); }
        
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: center; }
    </style>
</head>
<body>

<div class="header"><span>1CLUB PRO</span><span id="uID">ID: --</span></div>

<div class="wallet-box">
    <small>Wallet Balance</small>
    <div class="bal-amt" onclick="checkAdmin()">₹<span id="uBal">0.00</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="openM('depM')" style="flex:1; background:var(--green); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Deposit</button>
        <button onclick="openM('witM')" style="flex:1; background:var(--primary); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Withdraw</button>
    </div>
</div>

<div class="game-area">
    <div class="timer-box">
        <div><small style="color:red;">Period</small><br><b id="period">---</b></div>
        <div style="text-align:right;"><small>Time Remaining</small><br><b id="timer" style="font-size:22px; color:var(--primary);">00:00</b></div>
    </div>
    <div class="grid-btn">
        <button class="btn" style="background:var(--green)" onclick="betPopup('Green')">Green</button>
        <button class="btn" style="background:var(--violet)" onclick="betPopup('Violet')">Violet</button>
        <button class="btn" style="background:var(--red)" onclick="betPopup('Red')">Red</button>
    </div>
    <div class="num-grid" id="nums"></div>
    <div class="bs-grid"><button class="btn" style="background:#ffa502" onclick="betPopup('Big')">Big</button><button class="btn" style="background:#2f3542" onclick="betPopup('Small')">Small</button></div>
</div>

<div class="invite-card" onclick="copyInvite()">🎁 INVITE FRIENDS (GET 10% BONUS)</div>

<div class="game-area">
    <table id="resTable"><tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr></table>
</div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>Deposit Amount</h3>
    <div class="amt-grid">
        <div class="amt-btn" onclick="setDep(100)">₹100</div>
        <div class="amt-btn" onclick="setDep(500)">₹500</div>
        <div class="amt-btn" onclick="setDep(1000)">₹1K</div>
    </div>
    <input type="number" id="dAmt" placeholder="Enter Amount" style="width:90%; padding:10px; margin-bottom:10px;">
    <div id="qrBox" style="display:none; margin:10px 0;">
        <img id="qrImg" style="width:150px;"><br>
        <small>UPI: poonamlondhe52-1@okhdfcbank</small>
    </div>
    <input type="text" id="dUTR" placeholder="12 Digit UTR Number" style="width:90%; padding:10px; margin-bottom:10px;">
    <button onclick="genQR()" style="width:100%; background:var(--green); border:none; padding:12px; color:#fff; border-radius:8px; margin-bottom:5px;">Show QR</button>
    <button onclick="sendDep()" style="width:100%; background:var(--primary); border:none; padding:12px; color:#fff; border-radius:8px;">Submit UTR</button>
    <p onclick="closeM('depM')" style="color:red; cursor:pointer;">Close</p>
</div></div>

<div id="witM" class="modal"><div class="modal-content">
    <h3>Withdrawal</h3>
    <input type="number" id="wAmt" placeholder="Min ₹200" style="width:90%; padding:10px; margin-bottom:10px;">
    <input type="text" id="wUpi" placeholder="UPI ID" style="width:90%; padding:10px; margin-bottom:10px;">
    <button onclick="sendWit()" style="width:100%; background:var(--primary); border:none; padding:12px; color:#fff; border-radius:8px;">Withdraw Now</button>
    <p onclick="closeM('witM')" style="color:red; cursor:pointer; margin-top:10px;">Cancel</p>
</div></div>

<div id="betSheet" class="bet-sheet">
    <div class="bet-head" id="betTitle">Betting</div>
    <div style="padding:20px;">
        <input type="number" id="manualAmt" placeholder="Type Amount" style="width:100%; padding:10px; margin-bottom:15px; text-align:center;">
        <div style="display:flex; justify-content:space-around; margin-bottom:20px;">
            <button onclick="setX(1)" class="m-btn">X1</button>
            <button onclick="setX(5)" class="m-btn">X5</button>
            <button onclick="setX(10)" class="m-btn">X10</button>
        </div>
        <button onclick="confirmBet()" style="width:100%; background:var(--orange); color:#fff; border:none; padding:15px; font-weight:bold; border-radius:10px;">Confirm Bet</button>
        <button onclick="closeBet()" style="width:100%; background:#eee; border:none; padding:10px; margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="statusPopup" class="win-modal"><div id="statusCard" class="win-card">
    <h2 id="statusTitle">Winner</h2>
    <div style="font-size:30px; font-weight:900;" id="statusAmt">₹0.00</div>
    <p id="statusInfo"></p>
    <button onclick="closeStatus()" style="background:#fff; color:#000; border:none; padding:10px 30px; border-radius:20px; margin-top:15px;">OK</button>
</div></div>

<div id="adminM" class="modal"><div class="modal-content">
    <h3>ADMIN PANEL</h3>
    <div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-bottom:10px;">
        <small>Force Result:</small><br>
        <button onclick="fix('Green')" style="background:green; color:#fff;">G</button>
        <button onclick="fix('Red')" style="background:red; color:#fff;">R</button>
        <button onclick="fix('Big')" style="background:orange; color:#fff;">B</button>
        <button onclick="fix('Small')" style="background:black; color:#fff;">S</button>
    </div>
    <div id="adminReqs"></div>
    <button onclick="closeM('adminM')" style="width:100%; padding:10px; margin-top:10px;">Exit</button>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU", authDomain: "my-colour-game-670af.firebaseapp.com", databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com", projectId: "my-colour-game-670af" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('1CLUB_UID_FINAL') || "U"+Math.floor(1000+Math.random()*9000);
    localStorage.setItem('1CLUB_UID_FINAL', uid);
    let bal = 0, lastP = 0, selType = '', multiplier = 1, sessionStart = Date.now();

    db.ref('users/'+uid).on('value', s => { bal = (s.val() && s.val().balance) || 0; document.getElementById('uBal').innerText = bal.toFixed(2); document.getElementById('uID').innerText = "ID: "+uid; });

    // Timer & Result Calculation
    setInterval(() => {
        let now = Date.now(), s = 60 - Math.floor((now / 1000) % 60), p = Math.floor(now / 60000);
        document.getElementById('timer').innerText = "00:" + (s < 10 ? "0"+s : s);
        document.getElementById('period').innerText = p;
        if(s === 1 && lastP !== p) { lastP = p; calculateResult(p); }
    }, 1000);

    function calculateResult(p) {
        db.ref('admin/manual').once('value', m => {
            db.ref('bets/'+p).once('value', b => {
                let pool = { Green:0, Red:0, Big:0, Small:0 };
                b.forEach(u => u.forEach(x => pool[x.val().type] += x.val().amt));
                // LOGIC: Manual override or lowest bet wins
                let win = m.val() || Object.keys(pool).reduce((a,b) => pool[a] <= pool[b] ? a : b);
                let num = (win=='Green')?3:(win=='Red')?4:(win=='Big')?8:1;
                db.ref('global_res/'+p).set({ win, num, time: Date.now() });
                db.ref('admin/manual').set(null);
            });
        });
    }

    // Latest 20 Rounds History
    db.ref('global_res').limitToLast(20).on('value', s => {
        let h = "<tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr>";
        let arr = []; s.forEach(x => arr.push({p:x.key, ...x.val()}));
        arr.reverse().forEach(d => {
            h += `<tr><td>${d.p}</td><td>${d.num}</td><td>${d.num>=5?'Big':'Small'}</td><td style="color:${d.win=='Red'?'red':'green'}">${d.win}</td></tr>`;
        });
        document.getElementById('resTable').innerHTML = h;
    });

    // Win/Loss Popup Logic
    db.ref('global_res').on('child_added', snap => {
        let res = snap.val(); if(!res.time || res.time < sessionStart) return;
        db.ref('bets/'+snap.key+'/'+uid).once('value', s => {
            if(!s.exists()) return;
            let totalWin = 0;
            s.forEach(b => { if(b.val().type == res.win || (res.num>=5 && b.val().type=='Big') || (res.num<5 && b.val().type=='Small')) totalWin += b.val().amt * 1.9; });
            showPopup(totalWin);
            if(totalWin > 0) db.ref('users/'+uid+'/balance').transaction(c=>(c||0)+totalWin);
        });
    });

    function showPopup(amt) {
        let win = amt > 0;
        document.getElementById('statusTitle').innerText = win ? "Congratulations" : "Loss";
        document.getElementById('statusAmt').innerText = "₹" + amt.toFixed(2);
        document.getElementById('statusCard').className = win ? "win-card green-bg" : "win-card";
        document.getElementById('statusPopup').style.display = 'flex';
    }

    // Helper Functions
    function betPopup(t) { selType = t; document.getElementById('betTitle').innerText = "Select " + t; openM('betSheet'); }
    function setX(x) { multiplier = x; }
    function confirmBet() {
        let a = parseFloat(document.getElementById('manualAmt').value) * multiplier;
        if(bal >= a && a > 0) { db.ref('users/'+uid).update({balance: bal-a}); db.ref('bets/'+document.getElementById('period').innerText+'/'+uid).push({type:selType, amt:a}); closeBet(); }
        else alert("Invalid amount or Low balance!");
    }
    function setDep(v) { document.getElementById('dAmt').value = v; }
    function genQR() { document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?data=upi://pay?pa=poonamlondhe52-1@okhdfcbank%26am=${document.getElementById('dAmt').value}`; document.getElementById('qrBox').style.display = 'block'; }
    function sendDep() { db.ref('requests').push({uid, amt: document.getElementById('dAmt').value, utr: document.getElementById('dUTR').value, type:'Dep'}); alert("Submitted!"); closeM('depM'); }
    function sendWit() { let a = document.getElementById('wAmt').value; if(bal>=a && a>=200) { db.ref('users/'+uid).update({balance: bal-a}); db.ref('requests').push({uid, amt: a, upi: document.getElementById('wUpi').value, type:'Wit'}); alert("Request Sent!"); closeM('witM'); } }
    
    // Admin
    function checkAdmin() { if(prompt("Pass:")=="77759636477") { openM('adminM'); loadAdmin(); } }
    function fix(v) { db.ref('admin/manual').set(v); alert("Next result fixed to: "+v); }
    function loadAdmin() {
        db.ref('requests').on('value', s => {
            let h = "<table>";
            s.forEach(r => { let d = r.val(); h += `<tr><td>${d.uid}</td><td>${d.amt}</td><td><button onclick="appr('${r.key}','${d.uid}',${d.amt})">✔</button><button onclick="db.ref('requests/${r.key}').remove()">✖</button></td></tr>`; });
            document.getElementById('adminReqs').innerHTML = h + "</table>";
        });
    }
    function appr(k,u,a) { db.ref('users/'+u+'/balance').transaction(c=>(c||0)+a); db.ref('requests/'+k).remove(); }
    
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function closeBet() { closeM('betSheet'); }
    function closeStatus() { closeM('statusPopup'); }
    function copyInvite() { navigator.clipboard.writeText(window.location.href+"?ref="+uid); alert("Link Copied!"); }
</script>
</body>
</html>
