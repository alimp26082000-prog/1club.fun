<div id="adminM" class="modal"><div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
    <h2 style="color:var(--primary); margin-top:0;">MASTER CONTROL</h2>
    
    <div style="background:#000; padding:15px; border-radius:10px; margin-bottom:15px;">
        <label>Next Crash Multiplier:</label>
        <input type="number" id="nextCrash" placeholder="e.g. 1.50" style="width:100%; margin-top:5px;">
        <button class="main-btn" style="background:var(--primary); width:100%; margin-top:10px;" onclick="setCrash()">Update Crash Point</button>
    </div>

    <h4 style="text-align:left; color:var(--green); margin-bottom:5px;">Deposit Requests:</h4>
    <div id="adminDepList" style="background:#000; padding:10px; border-radius:10px; text-align:left; font-size:11px; max-height:150px; overflow-y:auto; border:1px solid #333;">
        Loading Deposits...
    </div>

    <h4 style="text-align:left; color:var(--gold); margin-top:20px; margin-bottom:5px;">Withdrawal Requests:</h4>
    <div id="adminWithList" style="background:#000; padding:10px; border-radius:10px; text-align:left; font-size:11px; max-height:150px; overflow-y:auto; border:1px solid #333;">
        Loading Withdrawals...
    </div>

    <button class="action-btn" style="background:#333; width:100%; margin-top:20px;" onclick="closeM('adminM')">Close Panel</button>
</div></div>

<script>
    // --- Baki sara purana code waisa hi rahega ---
    
    // Admin Panel Fetching Logic
    function loadAdminRequests() {
        // 1. Fetch Deposits
        db.ref('admin/deposits').on('value', (snapshot) => {
            const list = document.getElementById('adminDepList');
            list.innerHTML = "";
            if(!snapshot.exists()) { list.innerHTML = "No pending deposits"; return; }
            
            snapshot.forEach((child) => {
                let data = child.val();
                list.innerHTML += `<div style="border-bottom:1px solid #222; padding:5px 0;">
                    <b>UID:</b> ${data.uid || 'User'} | <b>Amt:</b> ₹${data.amt} <br>
                    <b>UTR:</b> ${data.utr} | <button onclick="approveDep('${child.key}', '${data.uid}', ${data.amt})" style="color:var(--green); background:none; border:none; cursor:pointer;">[APPROVE]</button>
                </div>`;
            });
        });

        // 2. Fetch Withdrawals
        db.ref('admin/withdrawals').on('value', (snapshot) => {
            const list = document.getElementById('adminWithList');
            list.innerHTML = "";
            if(!snapshot.exists()) { list.innerHTML = "No pending withdrawals"; return; }
            
            snapshot.forEach((child) => {
                let data = child.val();
                list.innerHTML += `<div style="border-bottom:1px solid #222; padding:5px 0;">
                    <b>UPI:</b> ${data.upi} | <b>Amt:</b> ₹${data.amt} <br>
                    <button onclick="deleteReq('withdrawals/${child.key}')" style="color:var(--primary); background:none; border:none; cursor:pointer;">[PAID/DELETE]</button>
                </div>`;
            });
        });
    }

    // Approve Deposit Logic
    function approveDep(key, user, amount) {
        db.ref('users/'+user+'/balance').transaction((current) => {
            return (current || 0) + parseFloat(amount);
        }).then(() => {
            db.ref('admin/deposits/'+key).remove();
            alert("Deposit Approved! Money added to player wallet.");
        });
    }

    function deleteReq(path) {
        if(confirm("Are you sure?")) db.ref('admin/'+path).remove();
    }

    // Modify the Admin Trigger to load requests
    let taps = 0;
    document.getElementById('adminTrigger').onclick = () => {
        taps++; 
        if(taps === 5) {
            let p = prompt("Enter Master Code:");
            if(p === "77759636477") {
                openM('adminM');
                loadAdminRequests(); // Load data as soon as panel opens
            }
            taps = 0;
        }
    };

    // --- Baki sara game engine code copy karke niche lagayein ---
</script>
