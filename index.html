<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK AVIATOR | Server Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff003c; --bg: #050505; --green: #2ecc71; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; }
        
        .header { display: flex; justify-content: space-between; padding: 15px; background: #111; border-bottom: 2px solid var(--red); }
        .game-title { font-weight: 900; color: var(--red); cursor: pointer; }
        
        .stage { height: 280px; position: relative; background: radial-gradient(circle, #200 0%, #000 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #mult-display { font-size: 70px; font-weight: 900; z-index: 10; transition: 0.1s; }
        #jet { position: absolute; width: 60px; bottom: 20px; left: 20px; z-index: 5; }

        .admin-panel { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; padding: 20px; box-sizing: border-box; }
        .admin-panel input { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid var(--red); color: white; font-size: 18px; border-radius: 8px; }
        
        .bet-area { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; box-sizing: border-box; border-top: 1px solid #333; }
        .bet-btn { width: 100%; padding: 18px; border-radius: 12px; font-size: 22px; font-weight: 900; background: var(--green); color: white; border: none; }
        .status-bar { font-size: 10px; color: #555; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="game-title" id="masterAdmin">AK AVIATOR</div>
    <div id="userBal" style="color:var(--green); font-weight:bold;">₹0.00</div>
</div>

<div class="stage">
    <div id="mult-display">1.00x</div>
    <img src="https://img.icons8.com/color/96/fighter-jet.png" id="jet">
</div>

<div class="bet-area">
    <input type="number" id="betAmt" value="100" style="width:100%; background:#000; color:white; border:1px solid #444; padding:10px; margin-bottom:10px; border-radius:8px; text-align:center;">
    <button id="mainBtn" class="bet-btn">BET</button>
    <div class="status-bar">SERVER CONNECTED - GLOBAL SYNC ON</div>
</div>

<div id="adminUI" class="admin-panel">
    <h2 style="color:var(--red); text-align:center;">MASTER CONTROL</h2>
    <label>Set Next Crash (e.g. 1.05 or 500.00):</label>
    <input type="number" id="manualCrash" placeholder="Enter Multiplier">
    <button onclick="updateServerCrash()" class="bet-btn" style="background:var(--red)">SET GLOBAL CRASH</button>
    
    <div style="margin-top:30px;">
        <p>Deposit Requests:</p>
        <div id="depList" style="font-size:12px; height:150px; overflow-y:auto; border:1px solid #333; padding:10px;"></div>
    </div>
    <button onclick="closeAdmin()" class="bet-btn" style="background:#444; margin-top:20px;">BACK TO GAME</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentMult = 1.00;
    let isCrashed = false;
    let globalCrashPoint = 2.00;

    // Server-Side Sync Logic
    // Plane hamesha udta rahega, chahe koi khele ya na khele
    function syncGame() {
        db.ref('game/state').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            currentMult = data.multiplier;
            isCrashed = data.isCrashed;
            globalCrashPoint = data.crashAt;

            if (isCrashed) {
                document.getElementById('mult-display').innerText = "FLEW AWAY!";
                document.getElementById('mult-display').style.color = "var(--red)";
                document.getElementById('jet').style.opacity = "0";
            } else {
                document.getElementById('mult-display').innerText = currentMult.toFixed(2) + "x";
                document.getElementById('mult-display').style.color = "white";
                document.getElementById('jet').style.opacity = "1";
                animateJet(currentMult);
            }
        });
    }

    // Admin Functions
    function updateServerCrash() {
        let val = parseFloat(document.getElementById('manualCrash').value);
        if(val >= 1) {
            db.ref('game/control').set({ nextCrash: val });
            alert("Global Crash set to " + val + "x");
            closeAdmin();
        }
    }

    // Auto-Engine (Runs only on your Master Admin Side)
    // Ye system apne aap plane udayega aur crash karega
    function runGlobalEngine() {
        let m = 1.00;
        let active = true;
        let target = globalCrashPoint;

        setInterval(() => {
            if(active) {
                m += (m < 10) ? 0.01 : 0.2;
                db.ref('game/state').update({ multiplier: m, isCrashed: false });
                if(m >= target) {
                    active = false;
                    db.ref('game/state').update({ isCrashed: true });
                    setTimeout(() => { 
                        m = 1.00; active = true; 
                        // Har round ke baad ek naya random target (Admin control priority)
                        db.ref('game/control').once('value', s => {
                            target = s.val()?.nextCrash || (Math.random()*3 + 1.1);
                        });
                    }, 4000);
                }
            }
        }, 100);
    }

    function animateJet(m) {
        let x = (m - 1) * 25; let y = (m - 1) * 12;
        document.getElementById('jet').style.transform = `translate(${Math.min(x, 280)}px, -${Math.min(y, 180)}px)`;
    }

    // Admin Trigger (5 Taps)
    let taps = 0;
    document.getElementById('masterAdmin').onclick = () => {
        taps++;
        if(taps === 5) {
            let code = prompt("Admin Key:");
            if(code === "77759636477") document.getElementById('adminUI').style.display = 'block';
            taps = 0;
        }
    };

    function closeAdmin() { document.getElementById('adminUI').style.display = 'none'; }

    // Initial Sync
    syncGame();
    // Note: 'runGlobalEngine' ko aap kisi ek browser tab mein chala kar chhod dena, 
    // tabhi plane sabki screen par udelta rahega.
    if(confirm("Are you the Admin? Click OK to start Global Server Engine.")) {
        runGlobalEngine();
    }
</script>
</body>
</html>
