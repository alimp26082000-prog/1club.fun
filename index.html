<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fb5153; --bg: #f5f6fa; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; --gold: #fbc531; --orange: #ffa502; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; user-select: none; }
        .header { background: var(--primary); padding: 15px; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .wallet-box { background: #fff; margin: 15px; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .bal-amt { font-size: 30px; font-weight: 800; margin: 10px 0; cursor: pointer; }
        .game-area { background: #fff; margin: 15px; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .timer-box { display: flex; justify-content: space-between; background: #fff5f5; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .grid-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        
        /* Fixed Number Grid (0-9) */
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .n-btn { border: 2px solid #ddd; background: #fff; padding: 10px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 16px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin: auto; }
        .bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        /* Modals & Popups */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 15px; width: 90%; max-height: 85vh; overflow-y: auto; text-align: center; }
        .bet-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-radius: 25px 25px 0 0; z-index: 6000; display: none; flex-direction: column; }
        
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: center; }
    </style>
</head>
<body>

<div class="header"><span>1CLUB PRO</span><span id="uID">ID: --</span></div>

<div class="wallet-box">
    <small>Wallet Balance</small>
    <div class="bal-amt" onclick="checkAdmin()">₹<span id="uBal">0.00</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="openM('depM')" style="flex:1; background:var(--green); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Deposit</button>
        <button onclick="openM('witM')" style="flex:1; background:var(--primary); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Withdraw</button>
    </div>
</div>

<div class="game-area">
    <div class="timer-box">
        <div><small style="color:red;">Period</small><br><b id="period">---</b></div>
        <div style="text-align:right;"><small>Time Remaining</small><br><b id="timer" style="font-size:22px; color:var(--primary);">00:00</b></div>
    </div>
    <div class="grid-btn">
        <button class="btn" style="background:var(--green)" onclick="betPopup('Green')">Green</button>
        <button class="btn" style="background:var(--violet)" onclick="betPopup('Violet')">Violet</button>
        <button class="btn" style="background:var(--red)" onclick="betPopup('Red')">Red</button>
    </div>
    <div class="num-grid">
        <button class="n-btn" style="color:var(--violet)" onclick="betPopup('0')">0</button>
        <button class="n-btn" style="color:var(--green)" onclick="betPopup('1')">1</button>
        <button class="n-btn" style="color:var(--red)" onclick="betPopup('2')">2</button>
        <button class="n-btn" style="color:var(--green)" onclick="betPopup('3')">3</button>
        <button class="n-btn" style="color:var(--red)" onclick="betPopup('4')">4</button>
        <button class="n-btn" style="color:var(--violet)" onclick="betPopup('5')">5</button>
        <button class="n-btn" style="color:var(--red)" onclick="betPopup('6')">6</button>
        <button class="n-btn" style="color:var(--green)" onclick="betPopup('7')">7</button>
        <button class="n-btn" style="color:var(--red)" onclick="betPopup('8')">8</button>
        <button class="n-btn" style="color:var(--green)" onclick="betPopup('9')">9</button>
    </div>
    <div class="bs-grid"><button class="btn" style="background:#ffa502" onclick="betPopup('Big')">Big</button><button class="btn" style="background:#2f3542" onclick="betPopup('Small')">Small</button></div>
</div>

<div class="game-area">
    <h4 style="margin:0;">Game History</h4>
    <table id="resTable"><tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr></table>
</div>

<div id="betSheet" class="bet-sheet">
    <div style="background:var(--orange); padding:15px; color:white; font-weight:bold; border-radius:25px 25px 0 0;" id="betTitle">Select Option</div>
    <div style="padding:20px;">
        <input type="number" id="manualAmt" placeholder="Type Amount" style="width:100%; padding:10px; margin-bottom:15px; text-align:center; border:1px solid #ddd; border-radius:8px;">
        <div style="display:flex; justify-content:space-around; margin-bottom:20px;">
            <button onclick="setX(1)" class="btn" style="background:#eee; color:#000;">X1</button>
            <button onclick="setX(5)" class="btn" style="background:#eee; color:#000;">X5</button>
            <button onclick="setX(10)" class="btn" style="background:#eee; color:#000;">X10</button>
        </div>
        <button onclick="confirmBet()" style="width:100%; background:var(--orange); color:#fff; border:none; padding:15px; font-weight:bold; border-radius:10px;">Confirm Bet</button>
        <button onclick="closeM('betSheet')" style="width:100%; background:#f5f5f5; border:none; padding:10px; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU", authDomain: "my-colour-game-670af.firebaseapp.com", databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com", projectId: "my-colour-game-670af" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('1CLUB_UID_FINAL') || "U"+Math.floor(1000+Math.random()*9000);
    localStorage.setItem('1CLUB_UID_FINAL', uid);
    let bal = 0, lastP = 0, selType = '', multiplier = 1;

    db.ref('users/'+uid).on('value', s => { bal = (s.val() && s.val().balance) || 0; document.getElementById('uBal').innerText = bal.toFixed(2); document.getElementById('uID').innerText = "ID: "+uid; });

    // Sync Timer across all IDs
    setInterval(() => {
        let now = Date.now(), s = 60 - Math.floor((now / 1000) % 60), p = Math.floor(now / 60000);
        document.getElementById('timer').innerText = "00:" + (s < 10 ? "0"+s : s);
        document.getElementById('period').innerText = p;
        if(s === 1 && lastP !== p) { lastP = p; checkAndGenerateResult(p); }
    }, 1000);

    function checkAndGenerateResult(p) {
        db.ref('global_res/'+p).once('value', s => {
            if(!s.exists()) {
                db.ref('admin/manual').once('value', m => {
                    db.ref('bets/'+p).once('value', b => {
                        let pool = { Green:0, Red:0, Big:0, Small:0 };
                        b.forEach(u => u.forEach(x => pool[x.val().type] += x.val().amt));
                        let win = m.val() || Object.keys(pool).reduce((a,b) => pool[a] <= pool[b] ? a : b);
                        let num = (win=='Green')?3:(win=='Red')?4:(win=='Big')?8:1;
                        db.ref('global_res/'+p).set({ win, num, time: Date.now() });
                        db.ref('admin/manual').set(null);
                    });
                });
            }
        });
    }

    // Fixed History: Show 20 results, latest on top
    db.ref('global_res').limitToLast(20).on('value', s => {
        let h = "<tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr>";
        let arr = []; s.forEach(x => arr.push({p:x.key, ...x.val()}));
        arr.reverse().forEach(d => {
            let color = (d.num==0 || d.num==5)?'#9b59b6':(d.num%2==0?'red':'green');
            h += `<tr><td>${d.p}</td><td>${d.num}</td><td>${d.num>=5?'Big':'Small'}</td><td style="color:${color}">${d.win || (d.num%2==0?'Red':'Green')}</td></tr>`;
        });
        document.getElementById('resTable').innerHTML = h;
    });

    function betPopup(t) { selType = t; document.getElementById('betTitle').innerText = "Betting: " + t; document.getElementById('betSheet').style.display = 'flex'; }
    function setX(x) { multiplier = x; }
    function confirmBet() {
        let a = parseFloat(document.getElementById('manualAmt').value || 10) * multiplier;
        if(bal >= a) { db.ref('users/'+uid).update({balance: bal-a}); db.ref('bets/'+document.getElementById('period').innerText+'/'+uid).push({type:selType, amt:a}); document.getElementById('betSheet').style.display='none'; }
        else alert("Low balance!");
    }
    function checkAdmin() { if(prompt("Pass:")=="77759636477") { /* Admin logic remains same */ } }
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
