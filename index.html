<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1CLUB PRO - Official</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>

:root{
--primary:#2b3270;
--bg:#0c0f26;
--accent:#ffc107;
--green:#00c853;
--red:#ff1744;
--violet:#aa00ff;
}

body{
font-family:Segoe UI;
background:var(--bg);
margin:0;
color:#fff;
}

#loginScreen{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-card{
background:var(--primary);
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
text-align:center;
border:1px solid var(--accent);
}

.top-nav{
background:var(--primary);
padding:15px;
display:flex;
justify-content:space-between;
}

.wallet-card{
background:linear-gradient(135deg,#3f478a,#2b3270);
margin:15px;
padding:20px;
border-radius:20px;
text-align:center;
}

.bal-amt{
font-size:36px;
font-weight:bold;
color:var(--accent);
}

.game-card{
background:#1e254d;
margin:10px;
border-radius:20px;
padding:20px;
}

.bet-btn{
border:none;
padding:15px;
border-radius:12px;
font-weight:900;
color:#fff;
cursor:pointer;
width:31%;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
z-index:5000;
align-items:center;
justify-content:center;
}

.modal-content{
background:var(--primary);
padding:20px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#0c0f26;
color:#fff;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
border:1px solid #3f478a;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<div id="loginScreen">
<div class="login-card">
<h1 style="color:var(--accent)">1CLUB PRO</h1>

<input type="number" id="lPhone" placeholder="Enter Mobile Number">

<button onclick="instantLogin()" style="width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;font-weight:bold;">
START GAME
</button>

</div>
</div>

<div id="gameUI" style="display:none">

<div class="top-nav">
<div>1CLUB <span style="color:var(--accent)">PRO</span></div>
<div id="uID">ID...</div>
</div>

<div class="wallet-card">

<div>Balance</div>
<div class="bal-amt">₹<span id="uBal">0</span></div>

</div>

<div class="game-card">

<div style="display:flex;justify-content:space-between">

<div>
<small>Period</small><br>
<b id="period"></b>
</div>

<div>
<small>Time</small><br>
<b id="timer"></b>
</div>

</div>

<div style="display:flex;justify-content:space-between;margin-top:15px">

<button class="bet-btn" style="background:var(--green)" onclick="placeBet('Green')">GREEN</button>

<button class="bet-btn" style="background:var(--violet)" onclick="placeBet('Violet')">VIOLET</button>

<button class="bet-btn" style="background:var(--red)" onclick="placeBet('Red')">RED</button>

</div>

</div>

<div style="padding:15px">

<h3>Last Results</h3>

<table>

<thead>
<tr>
<th>Period</th>
<th>Result</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<div id="betModal" class="modal">
<div class="modal-content">

<h3 id="betTitle"></h3>

<input type="number" id="betAmount" placeholder="Enter Amount">

<button onclick="confirmBet()" style="background:var(--green);padding:12px;border:none;border-radius:10px;color:#fff;width:100%;font-weight:bold;">
CONFIRM BET
</button>

<button onclick="closeM('betModal')" style="margin-top:10px;background:none;border:none;color:red;">
Cancel
</button>

</div>
</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
authDomain:"my-colour-game-670af.firebaseapp.com",
databaseURL:"https://my-colour-game-670af-default-rtdb.firebaseio.com",
projectId:"my-colour-game-670af",
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let uid=localStorage.getItem("ouid");

let myBal=0;

let selectedColor="";

let periodBets={Green:0,Red:0,Violet:0};

if(uid){showGameUI();}

function instantLogin(){

let phone=document.getElementById("lPhone").value.trim();

if(phone.length<10){

alert("Enter valid number");

return;

}

uid="ID"+phone.slice(-4);

localStorage.setItem("ouid",uid);

db.ref("users/"+uid).once("value").then(snap=>{

if(!snap.exists()){

db.ref("users/"+uid).set({

balance:0,
phone:phone

});

}

showGameUI();

});

}

function showGameUI(){

document.getElementById("loginScreen").style.display="none";

document.getElementById("gameUI").style.display="block";

initSystem();

}

function initSystem(){

db.ref("users/"+uid).on("value",s=>{

myBal=s.val()?s.val().balance:0;

document.getElementById("uBal").innerText=myBal.toFixed(2);

document.getElementById("uID").innerText="ID:"+uid;

});

setInterval(()=>{

let sec=60-new Date().getSeconds();

document.getElementById("timer").innerText="00:"+sec;

document.getElementById("period").innerText=Math.floor(new Date().getTime()/10000);

if(sec==1){calculateRound();}

},1000);

loadHistory();

}

function placeBet(color){

selectedColor=color;

document.getElementById("betTitle").innerText="Bet on "+color;

document.getElementById("betAmount").value="";

openM("betModal");

}

function confirmBet(){

let amt=parseFloat(document.getElementById("betAmount").value);

if(!amt||amt<10){

alert("Minimum bet ₹10");

return;

}

if(myBal<amt){

alert("Insufficient balance");

return;

}

db.ref("users/"+uid).update({

balance:myBal-amt

});

periodBets[selectedColor]+=amt;

db.ref("active_bets").push({

uid:uid,
color:selectedColor,
amount:amt

});

closeM("betModal");

alert("Bet placed");

}

function calculateRound(){

let colors=["Green","Red","Violet"];

let winColor=colors[Math.floor(Math.random()*3)];

let winAmt=periodBets[winColor]*1.9;

if(winAmt>0){

db.ref("users/"+uid).update({

balance:myBal+winAmt

});

alert("WIN ₹"+winAmt);

}else{

alert("Lost");

}

db.ref("history").push({

period:document.getElementById("period").innerText,

color:winColor

});

periodBets={Green:0,Red:0,Violet:0};

}

function loadHistory(){

db.ref("history").limitToLast(20).on("value",snap=>{

let html="";

snap.forEach(d=>{

let data=d.val();

html=`<tr>
<td>${data.period}</td>
<td style="color:${data.color}">${data.color}</td>
</tr>`+html;

});

document.getElementById("historyTable").innerHTML=html;

});

}

function openM(id){

document.getElementById(id).style.display="flex";

}

function closeM(id){

document.getElementById(id).style.display="none";

}

</script>

</body>
</html>
