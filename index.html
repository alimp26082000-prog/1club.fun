<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2b3270; --bg: #0c0f26; --accent: #ffc107; --green: #00c853; --red: #ff1744; --violet: #aa00ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #fff; user-select: none; }
        .top-nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .wallet-card { background: linear-gradient(135deg, #3f478a, #2b3270); margin: 15px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .bal-amt { font-size: 36px; font-weight: bold; color: var(--accent); cursor: pointer; }
        .game-card { background: #1e254d; margin: 10px; border-radius: 20px; padding: 20px; border: 1px solid #3f478a; }
        .bet-btn { border: none; padding: 15px; border-radius: 12px; font-weight: 900; color: #fff; cursor: pointer; width: 31%; transition: transform 0.1s; }
        .bet-btn:active { transform: scale(0.95); }
        .trend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin: 3px; border: 1px solid rgba(255,255,255,0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: var(--primary); padding: 25px; border-radius: 25px; width: 85%; max-width: 450px; border: 1px solid var(--accent); text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #0c0f26; color: #fff; text-align: center; font-size: 16px; }
        .history-box { margin: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; }
        table { width: 100%; color: #fff; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #3f478a; padding: 10px; text-align: center; }
        .invite-btn { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 15px 0; width: 80%; }
    </style>
</head>
<body>

<div id="mainDashboard">
    <div class="top-nav">
        <div style="font-weight:900; font-size:24px;">1CLUB <span style="color:var(--accent);">PRO</span></div>
        <div id="uIDDisp" style="font-size:12px; opacity:0.8; background:rgba(0,0,0,0.2); padding:5px 12px; border-radius:20px;">ID: Loading...</div>
    </div>

    <div class="wallet-card">
        <div style="font-size:14px; opacity:0.8; margin-bottom:5px;">Wallet Balance</div>
        <div class="bal-amt" id="adminTrigger" onclick="checkAdminTap()">₹<span id="uBalDisp">0.00</span></div>
        <div style="display:flex; gap:12px; margin-top:15px;">
            <button onclick="openM('depM')" style="flex:1; padding:12px; background:var(--green); border:none; border-radius:12px; color:#fff; font-weight:bold;">DEPOSIT</button>
            <button onclick="openM('witM')" style="flex:1; padding:12px; background:var(--red); border:none; border-radius:12px; color:#fff; font-weight:bold;">WITHDRAW</button>
        </div>
    </div>

    <div class="game-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <div><small style="opacity:0.6;">Period</small><br><b id="gamePeriod" style="font-size:18px;">...</b></div>
            <div style="text-align:right;"><small style="opacity:0.6;">Count Down</small><br><b id="gameTimer" style="color:var(--accent); font-size:26px;">00:00</b></div>
        </div>
        <div style="display:flex; justify-content:space-between;">
            <button class="bet-btn" style="background:var(--green)" onclick="placeGameBet('Green')">GREEN</button>
            <button class="bet-btn" style="background:var(--violet)" onclick="placeGameBet('Violet')">VIOLET</button>
            <button class="bet-btn" style="background:var(--red)" onclick="placeGameBet('Red')">RED</button>
        </div>
        <div style="margin-top:25px; text-align:center; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
            <small style="opacity:0.5; letter-spacing:1px;">RECENT TRENDS (LAST 20)</small>
            <div id="trendHistory" style="margin-top:10px;"></div>
        </div>
    </div>

    <center><button class="invite-btn" onclick="copyReferral()">🎁 INVITE FRIENDS (10% Bonus)</button></center>

    <div class="history-box">
        <h3 style="margin:0 0 10px 0; color:var(--accent); font-size:16px; border-left:4px solid var(--accent); padding-left:10px;">MY PLAY HISTORY</h3>
        <div id="playerBetHistory" style="max-height: 200px; overflow-y: auto;">No bets yet.</div>
    </div>
</div>

<div id="adminPanel" class="modal"><div class="modal-content" style="max-width:600px;">
    <h2 style="color:var(--accent);">ADMIN CONTROL</h2>
    <div id="poolStatus" style="background:#0c0f26; padding:15px; border-radius:12px; margin-bottom:15px; font-weight:bold; color:var(--green);">
        Wait for bets...
    </div>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="setResult('Green')" style="flex:1; background:var(--green); border:none; padding:12px; color:white; border-radius:8px;">FORCE G</button>
        <button onclick="setResult('Violet')" style="flex:1; background:var(--violet); border:none; padding:12px; color:white; border-radius:8px;">FORCE V</button>
        <button onclick="setResult('Red')" style="flex:1; background:var(--red); border:none; padding:12px; color:white; border-radius:8px;">FORCE R</button>
    </div>
    <div id="adminReqs" style="text-align:left; max-height:300px; overflow-y:auto;"></div>
    <button onclick="closeM('adminPanel')" style="width:100%; margin-top:20px; padding:12px; background:var(--red); border:none; color:white; border-radius:10px;">CLOSE</button>
</div></div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>ADD CASH</h3>
    <input type="number" id="depAmt" placeholder="Amount (Min ₹100)" oninput="updateQR()">
    <div id="qrArea" style="display:none; margin:15px 0;">
        <img id="qrImg" src="" style="width:200px; border:10px solid #fff; border-radius:15px;">
        <p style="font-size:12px; color:var(--accent); margin-top:10px;">UPI: poonamlondhe52-1@okhdfcbank</p>
    </div>
    <input type="text" id="utr" placeholder="Enter 12 Digit UTR Number">
    <button onclick="submitDeposit()" style="width:100%; padding:15px; background:var(--green); border:none; color:white; font-weight:bold; border-radius:12px;">SUBMIT DEPOSIT</button>
    <button onclick="closeM('depM')" style="margin-top:10px; background:none; border:none; color:red;">Cancel</button>
</div></div>

<div id="witM" class="modal"><div class="modal-content">
    <h3>WITHDRAW</h3>
    <input type="number" id="witAmt" placeholder="Min Withdrawal ₹200">
    <input type="text" id="witUpi" placeholder="Enter UPI ID">
    <button onclick="submitWithdraw()" style="width:100%; padding:15px; background:var(--red); border:none; color:white; font-weight:bold; border-radius:12px;">REQUEST PAYOUT</button>
    <button onclick="closeM('witM')" style="margin-top:10px; background:none; border:none; color:red;">Cancel</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
      authDomain: "my-colour-game-670af.firebaseapp.com",
      databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com",
      projectId: "my-colour-game-670af",
      storageBucket: "my-colour-game-670af.firebasestorage.app",
      messagingSenderId: "1098639199054",
      appId: "1:1098639199054:web:b34a5aa3120ec0dbc5ac1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Auto-Login Logic: Immediate Entry for New Users
    let playerID = localStorage.getItem('user_id');
    if(!playerID) {
        playerID = "ID" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('user_id', playerID);
        db.ref('users/' + playerID).set({ balance: 0, id: playerID, joined: Date.now() });
    }

    let userBalance = 0, clickStreak = 0, myBets = [];

    // Real-time Data Sync
    db.ref('users/' + playerID).on('value', snap => {
        let data = snap.val();
        userBalance = data ? data.balance : 0;
        document.getElementById('uBalDisp').innerText = userBalance.toFixed(2);
        document.getElementById('uIDDisp').innerText = "ID: " + playerID;
    });

    // Game Loop
    setInterval(() => {
        let d = new Date(), s = 60 - d.getSeconds();
        document.getElementById('gameTimer').innerText = "00:" + (s < 10 ? "0"+s : s);
        document.getElementById('gamePeriod').innerText = Math.floor(d.getTime()/10000);
        if(s === 1) calculateGameResult();
    }, 1000);

    function placeGameBet(col) {
        let val = prompt(`Bet on ${col} (Min ₹10):`, "10");
        if(val && userBalance >= val && val >= 10) {
            let amount = parseFloat(val);
            db.ref('users/'+playerID).update({ balance: userBalance - amount });
            let betObj = { uid: playerID, color: col, amount: amount, period: document.getElementById('gamePeriod').innerText };
            db.ref('active_bets').push(betObj);
            myBets.push(betObj);
            refreshHistory();
        } else { alert("Insufficient balance!"); }
    }

    function calculateGameResult() {
        db.ref('active_bets').once('value', (snap) => {
            let pools = { Green: 0, Red: 0, Violet: 0 };
            snap.forEach(b => { pools[b.val().color] += b.val().amount; });

            db.ref('admin/manual').once('value', s => {
                // Logic: Win the color with the LEAST amount of money
                let winningColor = s.val() || Object.keys(pools).reduce((a, b) => pools[a] < pools[b] ? a : b);
                db.ref('admin/manual').set(null); 
                
                myBets.forEach(bet => {
                    if(bet.color === winningColor) {
                        db.ref('users/'+playerID).update({ balance: userBalance + (bet.amount * 1.9) });
                        alert("🎉 WIN! Period " + bet.period + " Result: " + winningColor);
                    }
                });
                
                db.ref('trends').push({ color: {Green:'#00c853', Red:'#ff1744', Violet:'#aa00ff'}[winningColor] });
                myBets = []; refreshHistory(); db.ref('active_bets').remove();
            });
        });
    }

    // Admin Access (5 Taps on Balance)
    function checkAdminTap() {
        clickStreak++;
        if(clickStreak >= 5) {
            if(prompt("Enter Admin Key:") === "77759636477") { openM('adminPanel'); runAdminHub(); }
            clickStreak = 0;
        } setTimeout(() => clickStreak = 0, 2500);
    }

    function runAdminHub() {
        db.ref('active_bets').on('value', s => {
            let p = { Green: 0, Red: 0, Violet: 0 };
            s.forEach(x => { p[x.val().color] += x.val().amount; });
            document.getElementById('poolStatus').innerText = `LIVE POOL -> G: ₹${p.Green} | V: ₹${p.Violet} | R: ₹${p.Red}`;
        });
        db.ref('requests').on('value', s => {
            let html = "<table><tr><th>Type</th><th>Player</th><th>Amt</th><th>Info</th><th>Action</th></tr>";
            s.forEach(r => {
                html += `<tr><td>${r.val().type}</td><td>${r.val().uid}</td><td>${r.val().amt}</td><td>${r.val().info}</td>
                <td><button onclick="processReq('${r.key}','${r.val().uid}',${r.val().amt},'${r.val().type}')" style="background:var(--green); border:none; color:white; padding:5px; border-radius:5px;">Approve</button></td></tr>`;
            });
            document.getElementById('adminReqs').innerHTML = html + "</table>";
        });
    }

    function processReq(key, uid, amt, type) {
        if(type === 'Deposit') db.ref('users/'+uid+'/balance').transaction(c => (c||0) + parseFloat(amt));
        db.ref('requests/'+key).remove(); alert("Transaction Success!");
    }

    function updateQR() {
        let a = document.getElementById('depAmt').value;
        if(a >= 10) {
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=poonamlondhe52-1@okhdfcbank%26am=${a}`;
            document.getElementById('qrArea').style.display = 'block';
        }
    }

    function submitDeposit() {
        let a = document.getElementById('depAmt').value, u = document.getElementById('utr').value;
        if(a && u.length >= 10) { db.ref('requests').push({type:'Deposit', uid: playerID, amt:a, info:u}); alert("Request Sent!"); closeM('depM'); }
        else { alert("Enter valid Amount & UTR"); }
    }

    function submitWithdraw() {
        let a = document.getElementById('witAmt').value, u = document.getElementById('witUpi').value;
        if(a >= 200 && userBalance >= a) {
            db.ref('users/'+playerID).update({balance: userBalance - a});
            db.ref('requests').push({type:'Withdraw', uid: playerID, amt:a, info:u}); alert("Request Placed!"); closeM('witM');
        } else { alert("Min ₹200 and sufficient balance required."); }
    }

    function refreshHistory() {
        if(myBets.length === 0) { document.getElementById('playerBetHistory').innerHTML = "No bets yet."; return; }
        let h = "<table><tr><th>Period</th><th>Selection</th><th>Bet</th></tr>";
        myBets.forEach(b => { h += `<tr><td>${b.period}</td><td>${b.color}</td><td>₹${b.amount}</td></tr>`; });
        document.getElementById('playerBetHistory').innerHTML = h + "</table>";
    }

    db.ref('trends').limitToLast(20).on('value', s => {
        let div = document.getElementById('trendHistory'); div.innerHTML = "";
        s.forEach(t => { div.innerHTML += `<div class="trend-dot" style="background:${t.val().color}"></div>`; });
    });

    function setResult(c) { db.ref('admin/manual').set(c); alert("Next winner: " + c); }
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function copyReferral() { navigator.clipboard.writeText(window.location.href); alert("Referral Link Copied!"); }
</script>
</body>
</html>
