<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fb5153; --bg: #f5f6fa; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; --gold: #fbc531; --orange: #ffa502; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; user-select: none; }
        .header { background: var(--primary); padding: 15px; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .wallet-box { background: #fff; margin: 15px; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .bal-amt { font-size: 30px; font-weight: 800; margin: 10px 0; cursor: pointer; }
        .game-area { background: #fff; margin: 15px; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .timer-box { display: flex; justify-content: space-between; background: #fff5f5; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .n-btn { border: 2px solid #ddd; background: #fff; padding: 10px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 16px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin: auto; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 15px; width: 90%; text-align: center; }
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: center; }
    </style>
</head>
<body>

<div class="header"><span>1CLUB PRO</span><span id="uID">ID: --</span></div>

<div class="wallet-box">
    <small>Wallet Balance</small>
    <div class="bal-amt" onclick="checkAdmin()">₹<span id="uBal">0.00</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="openM('depM')" style="flex:1; background:var(--green); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Deposit</button>
        <button onclick="openM('witM')" style="flex:1; background:var(--primary); border:none; padding:12px; border-radius:25px; color:#fff; font-weight:bold;">Withdraw</button>
    </div>
</div>

<div class="game-area">
    <div class="timer-box">
        <div><small style="color:red;">Period</small><br><b id="period">---</b></div>
        <div style="text-align:right;"><small>Time Remaining</small><br><b id="timer" style="font-size:22px; color:var(--primary);">00:60</b></div>
    </div>
    <div id="nums" class="num-grid"></div>
</div>

<div class="game-area">
    <h4>Game History (Last 20 Results)</h4>
    <table id="resTable"><tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr></table>
</div>

<div id="witM" class="modal"><div class="modal-content">
    <h3>Withdrawal</h3>
    <input type="text" id="wUpi" placeholder="Enter UPI ID" style="width:90%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="number" id="wAmt" placeholder="Enter Amount" style="width:90%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
    <button onclick="sendWit()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;">Withdraw Now</button>
    <p onclick="closeM('witM')" style="color:red; cursor:pointer; margin-top:15px;">Cancel</p>
</div></div>

<div id="depM" class="modal"><div class="modal-content"><h3>Deposit</h3><input type="number" id="dAmt" placeholder="Amount" style="width:90%; padding:10px;"><button onclick="alert('Submit UTR')" style="width:100%; margin-top:10px; background:var(--green); color:white; border:none; padding:12px;">Next</button><p onclick="closeM('depM')" style="color:red; cursor:pointer;">Close</p></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU", authDomain: "my-colour-game-670af.firebaseapp.com", databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com", projectId: "my-colour-game-670af" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uid = localStorage.getItem('1CLUB_UID_FINAL') || "U"+Math.floor(1000+Math.random()*9000);
    localStorage.setItem('1CLUB_UID_FINAL', uid);
    let bal = 0, lastP = 0, serverOffset = 0;

    // Firebase Server Time Offset Calculation
    db.ref(".info/serverTimeOffset").on("value", (snap) => { serverOffset = snap.val(); });

    db.ref('users/'+uid).on('value', s => { bal = (s.val() && s.val().balance) || 0; document.getElementById('uBal').innerText = bal.toFixed(2); document.getElementById('uID').innerText = "ID: "+uid; });

    // Numbers Rendering
    let nH = ""; for(let i=0; i<=9; i++) { 
        let c = (i%2==0)?'var(--red)':'var(--green)'; if(i==0||i==5) c='var(--violet)';
        nH += `<button class="n-btn" style="color:${c}; border-color:${c}" onclick="alert('Betting Open')">${i}</button>`; 
    }
    document.getElementById('nums').innerHTML = nH;

    // Perfect Sync 60s Timer (Sare Players ke liye ek sath)
    setInterval(() => {
        const now = Date.now() + serverOffset; // Precise Server Time
        const seconds = 60 - Math.floor((now / 1000) % 60);
        const currentPeriod = Math.floor(now / 60000);
        
        document.getElementById('timer').innerText = "00:" + (seconds < 10 ? "0"+seconds : seconds);
        document.getElementById('period').innerText = currentPeriod;

        if(seconds === 1 && lastP !== currentPeriod) {
            lastP = currentPeriod;
            generateResult(currentPeriod);
        }
    }, 1000);

    function generateResult(p) {
        db.ref('global_res/'+p).once('value', s => {
            if(!s.exists()) {
                let winNum = Math.floor(Math.random()*10);
                db.ref('global_res/'+p).set({
                    num: winNum,
                    color: (winNum%2==0)?'Red':'Green',
                    size: (winNum>=5)?'Big':'Small',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        });
    }

    // History: Pichle 20 Results (Latest on Top)
    db.ref('global_res').limitToLast(20).on('value', s => {
        let h = "<tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr>";
        let data = [];
        s.forEach(child => { data.push({p: child.key, ...child.val()}); });
        data.reverse().forEach(d => {
            h += `<tr><td>${d.p}</td><td>${d.num}</td><td>${d.size}</td><td style="color:${d.color.toLowerCase()}">${d.color}</td></tr>`;
        });
        document.getElementById('resTable').innerHTML = h;
    });

    function sendWit() {
        let a = document.getElementById('wAmt').value;
        let u = document.getElementById('wUpi').value;
        if(bal >= a && a >= 200 && u.length > 5) {
            db.ref('users/'+uid).update({balance: bal - a});
            db.ref('requests').push({uid, amt: a, upi: u, type: 'Withdrawal', status: 'Pending'});
            alert("Withdrawal Requested Successfully!"); closeM('witM');
        } else alert("Invalid Amount or UPI ID");
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function checkAdmin() { if(prompt("Pass:")=="77759636477") { /* Admin Panel logic */ } }
</script>
</body>
</html>
