<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CLUB PRO - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2b3270; --bg: #0c0f26; --accent: #ffc107; --green: #00c853; --red: #ff1744; --violet: #aa00ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #fff; user-select: none; }
        .top-nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
        .wallet-card { background: linear-gradient(135deg, #3f478a, #2b3270); margin: 15px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .bal-amt { font-size: 38px; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .game-card { background: #1e254d; margin: 15px; border-radius: 20px; padding: 20px; border: 1px solid #3f478a; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .bet-btn { border: none; padding: 16px; border-radius: 12px; font-weight: 900; color: #fff; cursor: pointer; width: 31%; transition: 0.2s; font-size: 14px; }
        .bet-btn:active { transform: scale(0.9); }
        .trend-dot { width: 16px; height: 16px; border-radius: 50%; display: inline-block; margin: 4px; box-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: var(--primary); padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; border: 1px solid var(--accent); text-align: center; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        input { width: 90%; padding: 14px; margin: 12px 0; border-radius: 12px; border: none; background: #0c0f26; color: #fff; text-align: center; font-size: 16px; }
        .history-box { margin: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; min-height: 100px; }
        table { width: 100%; color: #fff; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 10px; text-align: center; }
        .invite-btn { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; margin: 10px 0; width: 85%; box-shadow: 0 5px 15px rgba(255,193,7,0.3); }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="top-nav">
        <div style="font-weight:900; font-size:24px; letter-spacing:1px;">1CLUB <span style="color:var(--accent);">PRO</span></div>
        <div id="uID" style="font-size:12px; background:rgba(0,0,0,0.3); padding:6px 15px; border-radius:30px; border:1px solid rgba(255,255,255,0.1);">ID: ...</div>
    </div>

    <div class="wallet-card">
        <div style="font-size:14px; opacity:0.7; text-transform:uppercase; letter-spacing:1px;">Available Balance</div>
        <div class="bal-amt" onclick="adminCheck()">₹<span id="uBal">0.00</span></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button onclick="openM('depM')" style="flex:1; padding:15px; background:var(--green); border:none; border-radius:15px; color:#fff; font-weight:bold; font-size:15px;">DEPOSIT</button>
            <button onclick="openM('witM')" style="flex:1; padding:15px; background:var(--red); border:none; border-radius:15px; color:#fff; font-weight:bold; font-size:15px;">WITHDRAW</button>
        </div>
    </div>

    <div class="game-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div><small style="opacity:0.6;">Current Period</small><br><b id="period" style="font-size:20px;">...</b></div>
            <div style="text-align:right;"><small style="opacity:0.6;">Timer</small><br><b id="timer" style="color:var(--accent); font-size:28px;">00:00</b></div>
        </div>
        <div style="display:flex; justify-content:space-between;">
            <button class="bet-btn" style="background:var(--green)" onclick="doBet('Green')">GREEN</button>
            <button class="bet-btn" style="background:var(--violet)" onclick="doBet('Violet')">VIOLET</button>
            <button class="bet-btn" style="background:var(--red)" onclick="doBet('Red')">RED</button>
        </div>
        <div style="margin-top:25px; text-align:center; padding-top:15px; border-top:1px solid rgba(255,255,255,0.05);">
            <small style="opacity:0.5; font-weight:bold; letter-spacing:2px;">RECENT TRENDS (LAST 20)</small>
            <div id="trends" style="margin-top:12px;"></div>
        </div>
    </div>

    <center><button class="invite-btn" onclick="shareLink()">🎁 INVITE FRIENDS (10% Bonus)</button></center>

    <div class="history-box">
        <h3 style="margin:0 0 10px 0; color:var(--accent); font-size:16px;">MY GAME HISTORY</h3>
        <div id="history">No active bets. Play now!</div>
    </div>
</div>

<div id="adminPanel" class="modal"><div class="modal-content" style="max-width:600px;">
    <h3 style="color:var(--accent);">ADMIN CONTROL HUB</h3>
    <div id="liveBets" style="background:#0c0f26; padding:15px; border-radius:12px; margin-bottom:15px; font-family:monospace; color:var(--green);">Loading bets...</div>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="forceWin('Green')" style="flex:1; background:var(--green); border:none; padding:12px; color:white; border-radius:8px; font-weight:bold;">WIN G</button>
        <button onclick="forceWin('Violet')" style="flex:1; background:var(--violet); border:none; padding:12px; color:white; border-radius:8px; font-weight:bold;">WIN V</button>
        <button onclick="forceWin('Red')" style="flex:1; background:var(--red); border:none; padding:12px; color:white; border-radius:8px; font-weight:bold;">WIN R</button>
    </div>
    <div id="reqList" style="max-height:250px; overflow-y:auto; font-size:12px;"></div>
    <button onclick="closeM('adminPanel')" style="width:100%; margin-top:20px; padding:15px; background:var(--red); border:none; color:white; border-radius:12px; font-weight:bold;">EXIT ADMIN</button>
</div></div>

<div id="depM" class="modal"><div class="modal-content">
    <h3>DEPOSIT CASH</h3>
    <input type="number" id="dAmt" placeholder="Amount (Min ₹100)" oninput="drawQR()">
    <div id="qrBox" style="display:none; margin:15px 0;">
        <img id="qr" src="" style="width:200px; border:8px solid #fff; border-radius:15px;">
        <p style="font-size:12px; color:var(--accent); margin-top:8px;">Send to: poonamlondhe52-1@okhdfcbank</p>
    </div>
    <input type="text" id="dUTR" placeholder="12 Digit UTR Number">
    <button onclick="sendDep()" style="width:100%; padding:15px; background:var(--green); border:none; color:white; font-weight:bold; border-radius:15px;">SUBMIT REQUEST</button>
    <button onclick="closeM('depM')" style="margin-top:12px; background:none; border:none; color:var(--red);">Close</button>
</div></div>

<div id="witM" class="modal"><div class="modal-content">
    <h3>WITHDRAWAL</h3>
    <input type="number" id="wAmt" placeholder="Minimum ₹200">
    <input type="text" id="wUpi" placeholder="UPI ID for Payout">
    <button onclick="sendWit()" style="width:100%; padding:15px; background:var(--red); border:none; color:white; font-weight:bold; border-radius:15px;">REQUEST PAYOUT</button>
    <button onclick="closeM('witM')" style="margin-top:12px; background:none; border:none; color:var(--red);">Close</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCrt3NnWu9vOeXHyirYEAjOitPXBswLFwU",
      authDomain: "my-colour-game-670af.firebaseapp.com",
      databaseURL: "https://my-colour-game-670af-default-rtdb.firebaseio.com",
      projectId: "my-colour-game-670af",
      storageBucket: "my-colour-game-670af.firebasestorage.app",
      messagingSenderId: "1098639199054",
      appId: "1:1098639199054:web:b34a5aa3120ec0dbc5ac1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Instant User Handling
    let uid = localStorage.getItem('player_uid') || ("U" + Math.floor(1000 + Math.random() * 9000));
    localStorage.setItem('player_uid', uid);
    
    let bal = 0, taps = 0, currentBets = [];

    // Sync User Info
    db.ref('users/' + uid).on('value', s => {
        let val = s.val();
        if(!val) { db.ref('users/'+uid).set({balance:0, id:uid}); }
        bal = val ? val.balance : 0;
        document.getElementById('uBal').innerText = bal.toFixed(2);
        document.getElementById('uID').innerText = "ID: " + uid;
    });

    // Game Timer Logic
    setInterval(() => {
        let now = new Date(), sec = 60 - now.getSeconds();
        document.getElementById('timer').innerText = "00:" + (sec < 10 ? "0"+sec : sec);
        document.getElementById('period').innerText = Math.floor(now.getTime()/10000);
        if(sec === 1) processGameRound();
    }, 1000);

    function doBet(c) {
        let a = prompt(`Bet on ${c} (Min ₹10):`, "10");
        if(a && bal >= a && a >= 10) {
            let amt = parseFloat(a);
            db.ref('users/'+uid).update({ balance: bal - amt });
            let bet = { uid, color: c, amount: amt, period: document.getElementById('period').innerText };
            db.ref('active_bets').push(bet);
            currentBets.push(bet);
            updateHistory();
        } else { alert("Balance kam hai ya galat amount hai!"); }
    }

    function processGameRound() {
        db.ref('active_bets').once('value', (snap) => {
            let pools = { Green: 0, Red: 0, Violet: 0 };
            snap.forEach(b => { pools[b.val().color] += b.val().amount; });

            db.ref('admin/next_win').once('value', s => {
                let win = s.val() || Object.keys(pools).reduce((a, b) => pools[a] < pools[b] ? a : b);
                db.ref('admin/next_win').set(null); 
                
                currentBets.forEach(b => {
                    if(b.color === win) {
                        db.ref('users/'+uid).update({ balance: bal + (b.amount * 1.9) });
                        alert("🎉 WIN! Period " + b.period);
                    }
                });
                db.ref('trends').push({ color: {Green:'#00c853', Red:'#ff1744', Violet:'#aa00ff'}[win] });
                currentBets = []; updateHistory(); db.ref('active_bets').remove();
            });
        });
    }

    function adminCheck() {
        taps++;
        if(taps >= 5) {
            if(prompt("Admin Key:") === "77759636477") { openM('adminPanel'); initAdmin(); }
            taps = 0;
        } setTimeout(() => taps = 0, 3000);
    }

    function initAdmin() {
        db.ref('active_bets').on('value', s => {
            let b = { Green: 0, Red: 0, Violet: 0 };
            s.forEach(x => { b[x.val().color] += x.val().amount; });
            document.getElementById('liveBets').innerText = `POOL -> G: ₹${b.Green} | V: ₹${b.Violet} | R: ₹${b.Red}`;
        });
        db.ref('requests').on('value', s => {
            let h = "<table><tr><th>Type</th><th>UID</th><th>₹</th><th>Action</th></tr>";
            s.forEach(r => {
                h += `<tr><td>${r.val().type}</td><td>${r.val().uid}</td><td>${r.val().amt}</td>
                <td><button onclick="approveReq('${r.key}','${r.val().uid}',${r.val().amt},'${r.val().type}')" style="background:var(--green); border:none; color:white; padding:4px; border-radius:4px;">Approve</button></td></tr>`;
            });
            document.getElementById('reqList').innerHTML = h + "</table>";
        });
    }

    function approveReq(k, u, a, t) {
        if(t === 'Deposit') db.ref('users/'+u+'/balance').transaction(c => (c||0) + parseFloat(a));
        db.ref('requests/'+k).remove(); alert("Done!");
    }

    function drawQR() {
        let a = document.getElementById('dAmt').value;
        if(a >= 10) {
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=poonamlondhe52-1@okhdfcbank%26am=${a}`;
            document.getElementById('qrBox').style.display = 'block';
        }
    }

    function sendDep() {
        let a = document.getElementById('dAmt').value, u = document.getElementById('dUTR').value;
        if(a && u.length >= 10) { db.ref('requests').push({type:'Deposit', uid, amt:a, info:u}); alert("Request Sent!"); closeM('depM'); }
    }

    function sendWit() {
        let a = document.getElementById('wAmt').value, u = document.getElementById('wUpi').value;
        if(a >= 200 && bal >= a) {
            db.ref('users/'+uid).update({balance: bal - a});
            db.ref('requests').push({type:'Withdraw', uid, amt:a, info:u}); alert("Payout Requested!"); closeM('witM');
        }
    }

    function updateHistory() {
        if(currentBets.length === 0) { document.getElementById('history').innerHTML = "No active bets."; return; }
        let h = "<table><tr><th>Period</th><th>Color</th><th>Amount</th></tr>";
        currentBets.forEach(b => { h += `<tr><td>${b.period}</td><td>${b.color}</td><td>₹${b.amount}</td></tr>`; });
        document.getElementById('history').innerHTML = h + "</table>";
    }

    db.ref('trends').limitToLast(20).on('value', s => {
        let d = document.getElementById('trends'); d.innerHTML = "";
        s.forEach(t => { d.innerHTML += `<div class="trend-dot" style="background:${t.val().color}"></div>`; });
    });

    function forceWin(c) { db.ref('admin/next_win').set(c); alert("Next winner locked: " + c); }
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function shareLink() { navigator.clipboard.writeText(window.location.href); alert("Referral Link Copied!"); }
</script>
</body>
</html>
